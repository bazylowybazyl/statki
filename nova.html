<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symulator Eksplozji 3D - SCI-FI NOVA</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a24;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
            touch-action: none; 
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            bottom: 20px;
            left: 20px;
            pointer-events: none;
            background: rgba(10, 5, 20, 0.85);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid #aa33aa;
            box-shadow: 0 4px 25px rgba(200,50,255,0.3);
            backdrop-filter: blur(4px);
        }
        h1 { margin: 0 0 10px 0; font-size: 1.2rem; color: #ff55ff; text-transform: uppercase; letter-spacing: 2px;}
        p { margin: 5px 0; font-size: 0.9rem; color: #eeeeee; }
        .highlight { color: #55ffff; font-weight: bold; }
        
        #tuning-ui {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 5, 20, 0.85);
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid #aa33aa;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto;
            width: 280px;
            backdrop-filter: blur(4px);
            max-height: 80vh;
            overflow-y: auto;
        }
        .tune-row { margin-bottom: 12px; display: flex; flex-direction: column; }
        .tune-row-header { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px; color: #ffccaa; }
        .tune-row input[type=range] { width: 100%; cursor: pointer; accent-color: #ff55ff; }
        #copy-btn { 
            width: 100%; padding: 10px; margin-top: 10px;
            background: #441144; color: white; border: 1px solid #ff55ff; 
            border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        #copy-btn:hover { background: #662266; }
        #bg-label:hover { background: #662266 !important; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="ui">
        <h1>Symulator Eksplozji: Sci-Fi Nova</h1>
        <p>LPM - Zdetonuj ładunek w miejscu kliknięcia</p>
        <p>PPM - Przesuwanie kamery | Kółko - Zoom</p>
        <p style="font-size: 0.8em; color: #aaa; margin-top: 10px;">
            <span class="highlight">Optyczna Fala Uderzeniowa</span><br>
            Włączono Multi-Pass Rendering z efektem Refraction.
        </p>
    </div>

    <div id="tuning-ui">
        <h3 style="margin-top:0; margin-bottom:15px; font-size:1.1rem; color:#fff; text-align:center;">Parametry Eksplozji</h3>
        
        <div class="tune-row">
            <div class="tune-row-header"><label>Rozciągnięcie Smugi</label><span id="val-stretch">1.50</span></div>
            <input type="range" id="flame-stretch" min="0.0" max="6.0" step="0.1" value="1.5">
        </div>
        <div class="tune-row">
            <div class="tune-row-header"><label>Jasność HDR (Mnożnik)</label><span id="val-hdr">1.50</span></div>
            <input type="range" id="flame-hdr" min="0.5" max="15.0" step="0.5" value="1.5">
        </div>
        
        <div class="tune-row">
            <div class="tune-row-header"><label>Bloom Siła</label><span id="val-bloomStrength">2.20</span></div>
            <input type="range" id="flame-bloomStrength" min="0.0" max="5.0" step="0.1" value="2.2">
        </div>
        <div class="tune-row">
            <div class="tune-row-header"><label>Bloom Promień</label><span id="val-bloomRadius">0.70</span></div>
            <input type="range" id="flame-bloomRadius" min="0.0" max="2.0" step="0.05" value="0.7">
        </div>
        <div class="tune-row">
            <div class="tune-row-header"><label>Bloom Próg</label><span id="val-bloomThreshold">0.10</span></div>
            <input type="range" id="flame-bloomThreshold" min="0.0" max="1.0" step="0.05" value="0.1">
        </div>

        <div class="tune-row" style="margin-top: 15px;">
            <label for="bg-upload" id="bg-label" style="cursor:pointer; background: #221144; padding: 10px; text-align: center; border: 1px solid #ff55ff; border-radius: 4px; font-weight: bold; transition: 0.2s;">Wgraj własne tło (PNG/JPG)</label>
            <input type="file" id="bg-upload" accept="image/png, image/jpeg" style="display: none;">
        </div>

        <button id="copy-btn">Kopiuj Ustawienia</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, composer, controls, bloomPass;
        let rtTexture; // RenderTarget dla zniekształceń
        let lastTime;
        let globalTime = 0; 
        let screenShake = 0; 
        
        let fireParticleSystem;
        let smokeParticleSystem;
        let distortionManager; // Menadżer fali załamującej światło
        let targetDistance = 0; 
        let groundPlaneMesh; 
        let nebulaMesh; // NOWOŚĆ: Siatka tła kosmicznego

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.FlameSettings = {
            stretchMult: 1.5,
            velMult: 0.15,
            startSize: 120.0, 
            growth: 1.2,
            life: 0.35,
            smokeSize: 500.0,
            hdrIntensity: 1.5,
            fireAlpha: 0.80,
            explosionSize: 3.5,
            bloomStrength: 2.2,
            bloomRadius: 0.7,
            bloomThreshold: 0.1
        };

        const noiseChunk = `
            float hash(float n) { return fract(sin(n) * 43758.5453123); }
            float noise(vec3 x) {
                vec3 p = floor(x);
                vec3 f = fract(x);
                f = f * f * (3.0 - 2.0 * f);
                float n = p.x + p.y * 57.0 + 113.0 * p.z;
                return mix(mix(mix(hash(n + 0.0), hash(n + 1.0), f.x),
                               mix(hash(n + 57.0), hash(n + 58.0), f.x), f.y),
                           mix(mix(hash(n + 113.0), hash(n + 114.0), f.x),
                               mix(hash(n + 170.0), hash(n + 171.0), f.x), f.y), f.z);
            }
            float fbm(vec3 p) {
                float f = 0.0;
                f += 0.5000 * noise(p); p *= 2.02;
                f += 0.2500 * noise(p); p *= 2.03;
                f += 0.1250 * noise(p); p *= 2.01;
                return f;
            }
        `;

        function setupTuningUI() {
            const bindSlider = (id, key, valId) => {
                const el = document.getElementById(id);
                const valEl = document.getElementById(valId);
                el.value = window.FlameSettings[key];
                valEl.innerText = window.FlameSettings[key].toFixed(2);

                el.addEventListener('input', (e) => {
                    const val = parseFloat(e.target.value);
                    window.FlameSettings[key] = val;
                    valEl.innerText = val.toFixed(2);
                    
                    const uniformsToUpdate = ['u_' + key];
                    [fireParticleSystem, smokeParticleSystem].forEach(sys => {
                        if (sys && sys.material) {
                            uniformsToUpdate.forEach(u => {
                                if(sys.material.uniforms[u]) sys.material.uniforms[u].value = val;
                            });
                        }
                    });
                });
            };

            const bindBloomSlider = (id, key, valId, bloomProp) => {
                const el = document.getElementById(id);
                const valEl = document.getElementById(valId);
                el.value = window.FlameSettings[key];
                valEl.innerText = window.FlameSettings[key].toFixed(2);

                el.addEventListener('input', (e) => {
                    const val = parseFloat(e.target.value);
                    window.FlameSettings[key] = val;
                    valEl.innerText = val.toFixed(2);
                    if (bloomPass) {
                        bloomPass[bloomProp] = val;
                    }
                });
            };

            bindSlider('flame-stretch', 'stretchMult', 'val-stretch');
            bindSlider('flame-hdr', 'hdrIntensity', 'val-hdr');

            bindBloomSlider('flame-bloomStrength', 'bloomStrength', 'val-bloomStrength', 'strength');
            bindBloomSlider('flame-bloomRadius', 'bloomRadius', 'val-bloomRadius', 'radius');
            bindBloomSlider('flame-bloomThreshold', 'bloomThreshold', 'val-bloomThreshold', 'threshold');

            document.getElementById('copy-btn').addEventListener('click', () => {
                navigator.clipboard.writeText(JSON.stringify(window.FlameSettings, null, 2));
            });
        }

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050510, 0.000002); // Ekstremalnie rzadka mgła, by widzieć głębię kosmosu

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 10, 400000);
            camera.position.set(0, -100, 60000); 
            
            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance', desynchronized: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.body.appendChild(renderer.domElement);

            // RTTexture dla fali uderzeniowej
            rtTexture = new THREE.WebGLRenderTarget(
                window.innerWidth, window.innerHeight, 
                { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter, format: THREE.RGBAFormat }
            );

            controls = new OrbitControls(camera, renderer.domElement);
            controls.mouseButtons = { LEFT: null, MIDDLE: THREE.MOUSE.ROTATE, RIGHT: THREE.MOUSE.PAN };
            controls.enableZoom = false; 
            controls.enableDamping = true;
            controls.dampingFactor = 0.05; 
            controls.panSpeed = 2.5; 
            controls.minDistance = 5000;     
            controls.maxDistance = 250000; 

            const renderScene = new RenderPass(scene, camera);
            bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight), 
                window.FlameSettings.bloomStrength, 
                window.FlameSettings.bloomRadius, 
                window.FlameSettings.bloomThreshold
            );
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // Niewidzialna podłoga tylko do przechwytywania kliknięć myszy (Raycasting)
            const planeGeo = new THREE.PlaneGeometry(2000000, 2000000);
            const planeMat = new THREE.MeshBasicMaterial({ visible: false }); 
            groundPlaneMesh = new THREE.Mesh(planeGeo, planeMat);
            groundPlaneMesh.position.z = -10;
            scene.add(groundPlaneMesh);

            // --- STATYCZNE TŁO (ŁADOWANE LOKALNIE) ---
            const bgPlaneGeo = new THREE.PlaneGeometry(300000, 300000);
            const bgPlaneMat = new THREE.MeshBasicMaterial({ 
                color: 0x11111a, // Domyślne, ciemne tło (zanim wgrasz plik)
                depthWrite: false
            });
            nebulaMesh = new THREE.Mesh(bgPlaneGeo, bgPlaneMat);
            nebulaMesh.position.z = -5000;
            scene.add(nebulaMesh);

            // Obsługa wgrywania własnego tła z dysku
            document.getElementById('bg-upload').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const texture = new THREE.Texture(img);
                        texture.needsUpdate = true;
                        texture.colorSpace = THREE.SRGBColorSpace;
                        
                        // Obliczamy proporcje obrazu (aspect ratio)
                        const aspect = img.width / img.height;
                        
                        // Tworzymy nową geometrię, aby obraz zachował idealne proporcje bez spłaszczania
                        const newPlaneGeo = new THREE.PlaneGeometry(300000 * aspect, 300000);
                        nebulaMesh.geometry.dispose(); // Czyścimy starą pamięć
                        nebulaMesh.geometry = newPlaneGeo; // Podmieniamy na nową
                        
                        bgPlaneMat.map = texture;
                        bgPlaneMat.color.setHex(0xaaaaaa); // Lekkie przyciemnienie tekstury dla kontrastu z wybuchem
                        bgPlaneMat.needsUpdate = true;
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });

            fireParticleSystem = new GPUInstancedParticleManager(scene, 100000, THREE.AdditiveBlending);
            smokeParticleSystem = new GPUParticleManager(scene, 20000, THREE.NormalBlending);
            
            // Inicjalizacja Distort Managera
            distortionManager = new DistortionManager(scene, 10, rtTexture);

            setupTuningUI();

            targetDistance = camera.position.distanceTo(controls.target);

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousedown', onMouseDown);
            window.addEventListener('contextmenu', e => e.preventDefault()); 
            window.addEventListener('wheel', (e) => {
                targetDistance += e.deltaY * 50.0; 
                targetDistance = THREE.MathUtils.clamp(targetDistance, controls.minDistance, controls.maxDistance);
            }, { passive: false });
        }

        // --- DISTORTION MANAGER (Heat Haze / Optyczna fala uderzeniowa) ---
        class DistortionManager {
            constructor(scene, maxWaves, rtTexture) {
                this.waves = [];
                const geo = new THREE.SphereGeometry(1, 32, 32);
                
                for(let i=0; i<maxWaves; i++) {
                    const mat = new THREE.ShaderMaterial({
                        uniforms: { 
                            tDiffuse: { value: rtTexture.texture }, 
                            progress: { value: 0.0 } 
                        },
                        vertexShader: `
                            varying vec4 vScreenPos; varying vec3 vNormal; varying vec3 vViewPosition;
                            void main() {
                                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                                gl_Position = projectionMatrix * mvPosition;
                                vScreenPos = gl_Position;
                                vNormal = normalize(normalMatrix * normal);
                                vViewPosition = -mvPosition.xyz;
                            }
                        `,
                        fragmentShader: `
                            uniform sampler2D tDiffuse; uniform float progress;
                            varying vec4 vScreenPos; varying vec3 vNormal; varying vec3 vViewPosition;
                            
                            float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }

                            void main() {
                                vec2 uv = (vScreenPos.xy / vScreenPos.w) * 0.5 + 0.5;
                                vec3 normal = normalize(vNormal);
                                vec3 viewDir = normalize(vViewPosition);

                                // Efekt Fresnela dla "bańki"
                                float fresnel = 1.0 - abs(dot(normal, viewDir));
                                float ring = pow(fresnel, 5.0);
                                float noise = (hash(uv * 20.0) - 0.5) * 0.1;
                                float strength = (1.0 - progress) * 0.3; // Moc zniekształcenia

                                vec2 distortion = normal.xy * (ring + noise) * strength;
                                vec4 bgColor = texture2D(tDiffuse, uv - distortion);
                                
                                // Sci-Fi Nova Tint (Magenta/Cyan flash on the edge of the bubble)
                                vec3 tint = vec3(0.8, 0.2, 1.0) * ring * (1.0 - progress) * 0.5;

                                gl_FragColor = vec4(bgColor.rgb + tint, 1.0);
                            }
                        `,
                        transparent: true,
                        depthWrite: false
                    });
                    
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.visible = false;
                    scene.add(mesh);
                    
                    this.waves.push({ mesh, active: false, age: 0, maxLife: 1.5, targetScale: 10000 });
                }
            }
            
            spawn(x, y, z, maxScale, life) {
                const wave = this.waves.find(w => !w.active);
                if (!wave) return;
                
                wave.active = true;
                wave.age = 0;
                wave.maxLife = life;
                wave.targetScale = maxScale;
                wave.mesh.position.set(x, y, z);
                wave.mesh.scale.set(1, 1, 1);
                wave.mesh.material.uniforms.progress.value = 0;
                wave.mesh.visible = true;
            }
            
            update(delta) {
                for (let wave of this.waves) {
                    if (!wave.active) continue;
                    
                    wave.age += delta;
                    if (wave.age >= wave.maxLife) {
                        wave.active = false;
                        wave.mesh.visible = false;
                        continue;
                    }
                    
                    const progress = wave.age / wave.maxLife;
                    
                    // Szybki rozrost (Cubic Ease Out)
                    const easeOut = 1.0 - Math.pow(1.0 - progress, 3.0);
                    const scale = easeOut * wave.targetScale;
                    
                    // Spłaszczenie na osi Z, żeby fala rozchodziła się jak dysk tnący przestrzeń
                    wave.mesh.scale.set(scale, scale, scale * 0.4);
                    
                    wave.mesh.material.uniforms.progress.value = progress;
                }
            }
            
            hideAll() {
                for (let wave of this.waves) {
                    if (wave.active) wave.mesh.visible = false;
                }
            }
            
            showActive() {
                for (let wave of this.waves) {
                    if (wave.active) wave.mesh.visible = true;
                }
            }
        }

        class GPUInstancedParticleManager {
            constructor(scene, maxParticles, blendingType) {
                this.maxParticles = maxParticles;
                this.activeIndex = 0; 
                
                const baseGeo = new THREE.PlaneGeometry(1, 1);
                const geo = new THREE.InstancedBufferGeometry();
                geo.index = baseGeo.index;
                geo.setAttribute('position', baseGeo.attributes.position);
                geo.setAttribute('uv', baseGeo.attributes.uv);

                this.startPos = new Float32Array(maxParticles * 3);
                this.startVel = new Float32Array(maxParticles * 3);
                this.dataInfo = new Float32Array(maxParticles * 4); 
                
                geo.setAttribute('aStartPos', new THREE.InstancedBufferAttribute(this.startPos, 3));
                geo.setAttribute('aStartVel', new THREE.InstancedBufferAttribute(this.startVel, 3));
                geo.setAttribute('aData', new THREE.InstancedBufferAttribute(this.dataInfo, 4));
                geo.instanceCount = maxParticles;

                this.material = new THREE.ShaderMaterial({
                    uniforms: { 
                        uTime: { value: 0 },
                        u_startSize: { value: window.FlameSettings.startSize },
                        u_growth: { value: window.FlameSettings.growth },
                        u_hdrIntensity: { value: window.FlameSettings.hdrIntensity },
                        u_fireAlpha: { value: window.FlameSettings.fireAlpha },
                        u_stretchMult: { value: window.FlameSettings.stretchMult },
                        u_explosionSize: { value: window.FlameSettings.explosionSize }
                    },
                    vertexShader: `
                        attribute vec3 aStartPos;
                        attribute vec3 aStartVel;
                        attribute vec4 aData; 
                        
                        uniform float uTime;
                        uniform float u_startSize;
                        uniform float u_growth;
                        uniform float u_hdrIntensity;
                        uniform float u_fireAlpha;
                        uniform float u_stretchMult;
                        uniform float u_explosionSize;
                        
                        varying vec3 vColor;
                        varying float vAlpha;
                        varying vec2 vUv;
                        varying float vType;
                        varying float vAgeNorm;

                        float hash(float n) { return fract(sin(n) * 43758.5453123); }

                        void main() {
                            vUv = uv;
                            vType = aData.w; 
                            float startTime = aData.x;
                            float maxLife = aData.y;
                            float age = uTime - startTime;

                            if (age < 0.0 || age > maxLife) {
                                gl_Position = vec4(9999.0, 9999.0, 9999.0, 1.0);
                                return;
                            }

                            float ratio = 1.0 - (age / maxLife); 
                            vAgeNorm = age / maxLife; 
                            
                            vec3 pos = aStartPos + aStartVel * age;
                            float currentSize = aData.z; 
                            float stretchFactor = 1.0;
                            vec4 mvPosition;

                            if (vType < 0.5) { // MAIN FIRE (Silnik)
                                currentSize = currentSize * (1.0 + vAgeNorm * 1.5);
                                vColor = vec3(0.3, 0.8, 1.0) * 3.0;
                                vAlpha = ratio;
                                stretchFactor = 1.0 + length(aStartVel) * 0.0002;
                                
                                mvPosition = modelViewMatrix * vec4(pos, 1.0);
                                vec3 viewVel = (modelViewMatrix * vec4(aStartVel, 0.0)).xyz;
                                vec2 dir = normalize(viewVel.xy);
                                if (length(viewVel.xy) < 0.1) dir = vec2(0.0, 1.0);

                                vec2 scaledOffset = position.xy;
                                scaledOffset.x *= currentSize;
                                scaledOffset.y *= currentSize * stretchFactor; 
                                vec2 rotatedOffset;
                                rotatedOffset.x = scaledOffset.x * dir.y + scaledOffset.y * dir.x;
                                rotatedOffset.y = -scaledOffset.x * dir.x + scaledOffset.y * dir.y;
                                mvPosition.xy += rotatedOffset;
                            } 
                            else if (vType < 3.5) { // EXPLOSION CORE
                                float explosionAge = vAgeNorm;
                                float flash = 1.0 - pow(explosionAge, 0.4); 
                                
                                currentSize += age * 3000.0 * u_explosionSize;
                                
                                vec3 expCore = vec3(1.0, 0.7, 0.1); 
                                vec3 expMid = vec3(0.8, 0.2, 0.0);
                                vec3 expEdge = vec3(0.3, 0.0, 0.0); 
                                
                                if (explosionAge < 0.3) {
                                     vColor = mix(expCore, expMid, explosionAge / 0.3);
                                } else {
                                     vColor = mix(expMid, expEdge, (explosionAge - 0.3) / 0.7);
                                }
                                vColor *= u_hdrIntensity * 1.5; 
                                
                                vAlpha = pow(ratio, 1.5); 
                                stretchFactor = 1.0; 

                                mvPosition = modelViewMatrix * vec4(pos, 1.0);
                                mvPosition.xy += position.xy * currentSize;
                            }
                            else if (vType < 4.5) { // RAILGUN SPARKS
                                float drag = 3.5 + hash(aData.x) * 2.0; 
                                pos = aStartPos + aStartVel * ((1.0 - exp(-age * drag)) / drag);
                                
                                vec3 currentVel = aStartVel * exp(-age * drag);
                                float speed = length(currentVel);
                                
                                vec3 hot = vec3(1.0, 1.0, 1.0) * 5.0;
                                vec3 cold = vec3(1.0, 0.2, 0.8) * 2.0; 
                                vColor = mix(hot, cold, pow(vAgeNorm, 0.5)); 
                                
                                vAlpha = pow(ratio, 0.5) * 1.5; 
                                
                                mvPosition = modelViewMatrix * vec4(pos, 1.0);
                                
                                vec3 viewVel = (modelViewMatrix * vec4(currentVel, 0.0)).xyz;
                                vec2 dir = normalize(viewVel.xy);
                                if (length(viewVel.xy) < 0.1) dir = vec2(0.0, 1.0);

                                float width = aData.z;
                                float stretch = aData.z * speed * 0.0015 * u_stretchMult; 
                                
                                float tailFactor = 0.5 - position.y; 
                                
                                vec2 scaledOffset;
                                scaledOffset.x = position.x * width;
                                scaledOffset.y = -tailFactor * stretch; 
                                
                                vec2 rotatedOffset;
                                rotatedOffset.x = scaledOffset.x * dir.y + scaledOffset.y * dir.x;
                                rotatedOffset.y = -scaledOffset.x * dir.x + scaledOffset.y * dir.y;
                                
                                mvPosition.xy += rotatedOffset;
                            }
                            else if (vType < 5.5) { // ANAMORPHIC CORE
                                currentSize = aData.z * (0.5 + vAgeNorm * 0.5);
                                vColor = vec3(0.5, 1.0, 1.0) * 10.0; 
                                vAlpha = pow(ratio, 3.0); 
                                
                                mvPosition = modelViewMatrix * vec4(pos, 1.0);
                                mvPosition.xy += position.xy * currentSize;
                            }
                            else { // FRACTAL ENERGY RING
                                float waveCurve = pow(vAgeNorm, 0.4); 
                                currentSize = aData.z * waveCurve;
                                vColor = vec3(0.9, 0.1, 1.0) * 4.0; 
                                vAlpha = pow(1.0 - vAgeNorm, 1.5); 
                                
                                vec3 flatPos = pos;
                                flatPos.x += position.x * currentSize;
                                flatPos.y += position.y * currentSize;
                                mvPosition = modelViewMatrix * vec4(flatPos, 1.0);
                            }

                            gl_Position = projectionMatrix * mvPosition;
                        }
                    `,
                    fragmentShader: `
                        varying vec3 vColor;
                        varying float vAlpha;
                        varying vec2 vUv;
                        varying float vType; 
                        varying float vAgeNorm;
                        uniform float uTime;
                        
                        ${noiseChunk}

                        void main() {
                            vec2 uv = vUv - vec2(0.5);
                            float dist = length(uv) * 2.0; 

                            if (vType < 3.5) { // Ogień silnika i rdzeń eksplozji
                                float glow = max(0.0, 1.0 - pow(dist, 1.5)); 
                                if(dist > 1.0) discard;
                                gl_FragColor = vec4(vColor, glow * vAlpha);
                            } 
                            else if (vType < 4.5) { // RAILGUN SPARKS
                                vec2 pt = vUv - vec2(0.5);
                                float glowX = pow(max(0.0, 0.5 - abs(pt.x)) * 2.0, 3.0);
                                
                                float fadeY = smoothstep(1.0, 0.8, vUv.y) * smoothstep(0.0, 0.2, vUv.y); 
                                
                                float baseAlpha = glowX * fadeY;
                                
                                float twinkle = pow(sin(uTime * 30.0 + vColor.g * 100.0 + pt.x * 10.0), 2.0);
                                float twinkleBlend = smoothstep(0.05, 0.15, vAgeNorm); 
                                baseAlpha *= mix(1.0, twinkle, twinkleBlend);
                                
                                gl_FragColor = vec4(vColor, baseAlpha * vAlpha);
                            }
                            else if (vType < 5.5) { // ANAMORPHIC CORE
                                float core = max(0.0, 1.0 - smoothstep(0.0, 0.3, dist));
                                float flareY = max(0.0, 1.0 - smoothstep(0.0, 0.02, abs(uv.y)));
                                float flareX = max(0.0, 1.0 - smoothstep(0.0, 0.5, abs(uv.x)));
                                float flare = flareY * flareX * 2.0;
                                float aura = max(0.0, 1.0 - dist);
                                
                                float finalIntensity = max(0.0, core + flare + aura * 0.3);
                                gl_FragColor = vec4(vColor * finalIntensity, finalIntensity * vAlpha);
                            }
                            else { // FRACTAL ENERGY RING
                                if(dist > 1.0) discard;
                                float ringShape = max(0.0, 1.0 - smoothstep(0.0, 0.15, abs(dist - 0.7))); 
                                float angle = atan(uv.y, uv.x);
                                float n = fbm(vec3(angle * 10.0, dist * 5.0 - uTime * 2.0, uTime));
                                float finalRing = ringShape * (n * 2.5);
                                float innerGlow = max(0.0, smoothstep(0.0, 0.8, dist)) * 0.2;
                                
                                gl_FragColor = vec4(vColor, (finalRing + innerGlow) * vAlpha);
                            }
                        }
                    `,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false, 
                    depthTest: false, 
                    transparent: true
                });

                this.mesh = new THREE.Mesh(geo, this.material);
                this.mesh.frustumCulled = false; 
                this.mesh.renderOrder = 1000; 
                scene.add(this.mesh);
            }

            spawn(x, y, z, vx, vy, vz, size, life, type) {
                let i = this.activeIndex;
                this.activeIndex = (this.activeIndex + 1) % this.maxParticles;
                let i3 = i * 3, i4 = i * 4;
                
                this.startPos[i3]=x; this.startPos[i3+1]=y; this.startPos[i3+2]=z;
                this.startVel[i3]=vx; this.startVel[i3+1]=vy; this.startVel[i3+2]=vz;
                
                this.dataInfo[i4] = globalTime;     
                this.dataInfo[i4+1] = life;         
                this.dataInfo[i4+2] = size;         
                this.dataInfo[i4+3] = type;         
                
                const geo = this.mesh.geometry;
                geo.attributes.aStartPos.needsUpdate = true;
                geo.attributes.aStartVel.needsUpdate = true;
                geo.attributes.aData.needsUpdate = true;
            }

            update() {
                this.material.uniforms.uTime.value = globalTime;
            }
        }

        class GPUParticleManager {
            constructor(scene, maxParticles, blendingType) {
                this.maxParticles = maxParticles;
                this.activeIndex = 0; 
                
                const baseGeo = new THREE.PlaneGeometry(1, 1);
                const geo = new THREE.InstancedBufferGeometry();
                geo.index = baseGeo.index;
                geo.setAttribute('position', baseGeo.attributes.position);
                geo.setAttribute('uv', baseGeo.attributes.uv);

                this.startPos = new Float32Array(maxParticles * 3);
                this.startVel = new Float32Array(maxParticles * 3);
                this.dataInfo = new Float32Array(maxParticles * 4); 
                
                geo.setAttribute('aStartPos', new THREE.InstancedBufferAttribute(this.startPos, 3));
                geo.setAttribute('aStartVel', new THREE.InstancedBufferAttribute(this.startVel, 3));
                geo.setAttribute('aData', new THREE.InstancedBufferAttribute(this.dataInfo, 4));
                geo.instanceCount = maxParticles;

                this.material = new THREE.ShaderMaterial({
                    uniforms: { 
                        uTime: { value: 0 },
                        u_smokeSize: { value: window.FlameSettings.smokeSize }
                    },
                    vertexShader: `
                        attribute vec3 aStartPos;
                        attribute vec3 aStartVel;
                        attribute vec4 aData; 
                        uniform float uTime;
                        uniform float u_smokeSize;

                        varying vec3 vColor;
                        varying float vAlpha;
                        varying vec2 vUv;
                        varying float vAgeNorm;
                        varying float vType; 

                        void main() {
                            vUv = uv;
                            vType = aData.w;
                            float startTime = aData.x;
                            float maxLife = aData.y;
                            float age = uTime - startTime;

                            if (age < 0.0 || age > maxLife) {
                                gl_Position = vec4(9999.0, 9999.0, 9999.0, 1.0);
                                return;
                            }

                            vAgeNorm = age / maxLife; 
                            float waveCurve = pow(vAgeNorm, 0.4); 
                            float currentSize = aData.z * waveCurve;
                            
                            vColor = vec3(0.05, 0.05, 0.15); 
                            vAlpha = pow(1.0 - vAgeNorm, 2.0) * 0.9; 
                            
                            vec3 flatPos = aStartPos;
                            flatPos.x += position.x * currentSize;
                            flatPos.y += position.y * currentSize;
                            vec4 mvPosition = modelViewMatrix * vec4(flatPos, 1.0);

                            gl_Position = projectionMatrix * mvPosition;
                        }
                    `,
                    fragmentShader: `
                        varying vec3 vColor;
                        varying float vAlpha;
                        varying vec2 vUv;
                        varying float vAgeNorm;
                        varying float vType;
                        uniform float uTime;
                        
                        ${noiseChunk}

                        void main() {
                            vec2 uv = vUv - vec2(0.5);
                            float dist = length(uv) * 2.0; 
                            if(dist > 1.0) discard;
                            
                            if (vType < 1.5) { // SHOCKWAVE RING (Typ 1)
                                float ringShape = max(0.0, 1.0 - smoothstep(0.0, 0.4, abs(dist - 0.7))); 
                                float angle = atan(uv.y, uv.x);
                                float n = fbm(vec3(angle * 12.0, dist * 3.0 - uTime, uTime * 0.5));
                                
                                float finalAlpha = ringShape * n * vAlpha;
                                gl_FragColor = vec4(vColor, finalAlpha);
                            } else { // REGULAR SMOKE CLOUD (Typ 2)
                                float cloud = max(0.0, 1.0 - smoothstep(0.0, 1.0, dist));
                                float n = fbm(vec3(uv.x * 5.0, uv.y * 5.0 - uTime, uTime * 0.2));
                                float finalAlpha = cloud * n * vAlpha * 1.5;
                                gl_FragColor = vec4(vColor, finalAlpha);
                            }
                        }
                    `,
                    blending: blendingType,
                    depthWrite: false, 
                    depthTest: false, 
                    transparent: true
                });

                this.mesh = new THREE.Mesh(geo, this.material);
                this.mesh.frustumCulled = false; 
                this.mesh.renderOrder = 999; 
                scene.add(this.mesh);
            }

            spawn(x, y, z, vx, vy, vz, size, life, type) {
                let i = this.activeIndex;
                this.activeIndex = (this.activeIndex + 1) % this.maxParticles;
                let i3 = i * 3, i4 = i * 4;
                
                this.startPos[i3]=x; this.startPos[i3+1]=y; this.startPos[i3+2]=z;
                this.startVel[i3]=vx; this.startVel[i3+1]=vy; this.startVel[i3+2]=vz;
                
                this.dataInfo[i4] = globalTime;     
                this.dataInfo[i4+1] = life;         
                this.dataInfo[i4+2] = size;         
                this.dataInfo[i4+3] = type;         
                
                const geo = this.mesh.geometry;
                geo.attributes.aStartPos.needsUpdate = true;
                geo.attributes.aStartVel.needsUpdate = true;
                geo.attributes.aData.needsUpdate = true;
            }

            update() {
                this.material.uniforms.uTime.value = globalTime;
            }
        }

        // --- GŁÓWNA FUNKCJA EKSPLOZJI ---
        function triggerExplosion(x, y, z) {
            const explodeZ = Math.max(z, 160);
            const eSize = window.FlameSettings.explosionSize; 
            
            screenShake = 2500 * eSize;

            const expX = x;
            const expY = y;

            // 0. OPTYCZNA FALA UDERZENIOWA (Załamanie światła / Refraction)
            // Używamy menadżera deformacji na wielką skalę
            distortionManager.spawn(expX, expY, explodeZ, 120000 * eSize, 1.8);

            // 1. ANAMORPHIC CORE
            fireParticleSystem.spawn(expX, expY, explodeZ + 150, 0,0,0, 40000 * eSize, 1.2, 5);

            // 2. FRACTAL ENERGY RING
            fireParticleSystem.spawn(expX, expY, explodeZ + 50, 0,0,0, 65000 * eSize, 1.5, 6); 

            // 3. DARK OUTER SHOCKWAVE
            smokeParticleSystem.spawn(expX, expY, explodeZ, 0,0,0, 75000 * eSize, 1.6, 1); 

            // 4. RAILGUN SPARKS (Opóźnione o 1 sekundę)
            setTimeout(() => {
                for(let i=0; i<3000; i++) {
                    const speed = (15000 + Math.random() * 45000) * eSize;
                    const angle = Math.random() * Math.PI * 2;
                    
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    const vz = 0;

                    const startDist = Math.random() * 5000 * eSize;
                    const startX = expX + Math.cos(angle) * startDist;
                    const startY = expY + Math.sin(angle) * startDist;

                    fireParticleSystem.spawn(startX, startY, explodeZ + 200,
                        vx, vy, vz,
                        (40 + Math.random()*60)*eSize, 
                        2.5 + Math.random()*3.0, 
                        4); 
                }
            }, 1000); 
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            rtTexture.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseDown(event) {
            if(event.target.closest('#ui') || event.target.closest('#tuning-ui')) return;
            
            if (event.button === 0) { // Lewy przycisk myszy
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(groundPlaneMesh);
                
                if (intersects.length > 0) {
                    triggerExplosion(intersects[0].point.x, intersects[0].point.y, 160);
                }
            }
        }

        const originalCameraPos = new THREE.Vector3();

        function animate() {
            setTimeout(animate, 0);
            
            const now = performance.now();
            const delta = Math.min((now - lastTime) / 1000, 0.05); 
            lastTime = now;
            globalTime += delta; 
            
            if (targetDistance > 0) {
                const currentDistance = camera.position.distanceTo(controls.target);
                const newDistance = THREE.MathUtils.lerp(currentDistance, targetDistance, delta * 12);
                const direction = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
                originalCameraPos.copy(controls.target).add(direction.multiplyScalar(newDistance));
            } else {
                originalCameraPos.copy(camera.position);
            }
            
            if (screenShake > 0) {
                camera.position.x = originalCameraPos.x + (Math.random() - 0.5) * screenShake;
                camera.position.y = originalCameraPos.y + (Math.random() - 0.5) * screenShake;
                camera.position.z = originalCameraPos.z + (Math.random() - 0.5) * screenShake;
                screenShake *= 0.92; 
                if (screenShake < 1) screenShake = 0;
            } else {
                camera.position.copy(originalCameraPos);
            }

            controls.update();
            
            // 1. Zwykła aktualizacja systemów
            fireParticleSystem.update(); 
            smokeParticleSystem.update();
            distortionManager.update(delta);
            
            // 2. MULTI-PASS RENDERING (dla fali Distortion)
            const hasDistortion = distortionManager.waves.some(w => w.active);
            
            if (hasDistortion) {
                // A) Ukrywamy sfery zniekształceń
                distortionManager.hideAll();
                
                // B) Zrzucamy czysty obraz tła i efektów na RenderTexture
                renderer.setRenderTarget(rtTexture);
                renderer.clear();
                renderer.render(scene, camera);
                
                // C) Przywracamy sfery (z użyciem rtTexture)
                distortionManager.showActive();
            }

            // D) Renderujemy finałowy obraz do Composera
            renderer.setRenderTarget(null);
            composer.render();
        }

        init();
        lastTime = performance.now();
        animate();
    </script>
