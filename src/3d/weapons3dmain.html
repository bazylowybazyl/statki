<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zbrojownia AISPACE AAA - Poligon Testowy</title>
    <style>
        :root {
            --bg-color: #03050a;
            --panel-bg: rgba(9, 14, 23, 0.75);
            --border-color: rgba(30, 41, 59, 0.5);
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --accent: #ffb700; 
            --accent-glow: rgba(255, 183, 0, 0.4);
            --danger: #ff003c;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Rajdhani', 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; display: flex;
            user-select: none;
        }

        /* Scanlines & Vignette Effect */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 999; background-size: 100% 4px, 6px 100%; pointer-events: none;
        }
        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9); pointer-events: none; z-index: 998;
        }

        #sidebar {
            width: 380px; background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color); display: flex; flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.8); z-index: 10; position: relative;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        .header {
            padding: 30px 25px; border-bottom: 1px solid var(--border-color);
            background: linear-gradient(135deg, rgba(17, 24, 39, 0.8) 0%, transparent 100%);
            position: relative; overflow: hidden;
        }
        
        .header::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            box-shadow: 0 0 10px var(--accent);
        }

        .header h1 {
            margin: 0; font-size: 28px; color: #fff; text-transform: uppercase;
            letter-spacing: 4px; text-shadow: 0 0 15px var(--accent-glow); font-weight: 800;
        }

        .header p { margin: 10px 0 0 0; font-size: 14px; color: var(--accent); letter-spacing: 1px;}

        #weapon-list { flex: 1; overflow-y: auto; padding: 20px; }

        .weapon-item {
            display: flex; align-items: center; padding: 15px; margin-bottom: 15px;
            background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 4px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }

        .weapon-item::before {
            content: ''; position: absolute; left: 0; top: 0; width: 3px; height: 100%; 
            background: transparent; transition: all 0.3s;
        }

        .weapon-item:hover { background: rgba(30, 41, 59, 0.8); transform: translateX(5px); border-color: rgba(255,255,255,0.1); }
        .weapon-item.active { background: rgba(0, 240, 255, 0.05); border-color: rgba(0, 240, 255, 0.3); }
        .weapon-item.active::before { background: var(--accent); box-shadow: 0 0 15px var(--accent); }

        .checkbox-custom {
            width: 24px; height: 24px; border: 2px solid var(--text-muted); border-radius: 4px;
            margin-right: 15px; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0; background: rgba(0,0,0,0.5);
        }
        .weapon-item.active .checkbox-custom { background-color: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow);}
        .weapon-item.active .checkbox-custom::after { content: "✓"; color: #000; font-size: 16px; font-weight: 900; }

        .weapon-info { flex: 1; }
        .weapon-name { font-weight: 700; font-size: 16px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; letter-spacing: 1px; text-transform: uppercase;}
        .weapon-color-dot { width: 14px; height: 14px; border-radius: 50%; box-shadow: 0 0 10px currentColor; border: 2px solid rgba(255,255,255,0.2); }
        .weapon-stats { font-size: 12px; color: var(--text-muted); font-family: 'Courier New', monospace; letter-spacing: 0px;}

        #game-container { flex: 1; position: relative; background-color: #000; }
        #gameCanvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
        
        #hud {
            position: absolute; top: 30px; right: 30px; pointer-events: none;
            text-align: right; text-shadow: 0 2px 4px rgba(0,0,0,1);
            font-family: 'Courier New', Courier, monospace; z-index: 100;
            background: rgba(9, 14, 23, 0.6); padding: 20px; border-radius: 8px; 
            border: 1px solid var(--accent); box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
            backdrop-filter: blur(5px);
        }
        #hud div { margin-bottom: 8px; letter-spacing: 1px; }
        .hud-value { color: var(--accent); font-weight: bold; text-shadow: 0 0 8px var(--accent-glow); }
        
        .glitch-text { animation: glitch 2s infinite linear alternate-reverse; }
        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--danger), -2px 0 var(--accent); }
            5% { text-shadow: -2px 0 var(--danger), 2px 0 var(--accent); }
            10%, 100% { text-shadow: 0 0 0; }
        }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h1 class="glitch-text">Zbrojownia MAIN</h1>
            <p>OS: ONLINE // SYS_READY</p>
            <p style="color: var(--text-muted); font-size: 11px;">[SCROLL] ZOOM &nbsp;&nbsp; [LPM] FIRE</p>
        </div>
        <div id="weapon-list"></div>
    </div>

    <div id="game-container">
        <div id="hud">
            <div style="color: #64748b; font-size: 14px; font-weight:bold; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 10px;">DIAGNOSTICS_SYS_V2.5</div>
            <div style="color: #94a3b8; font-size: 15px;">POCISKI W LOCIE: <span id="bullet-count" class="hud-value">0</span></div>
            <div style="color: #94a3b8; font-size: 15px;">AKTYWNE VFX: <span id="particle-count" class="hud-value">0</span></div>
            <div style="color: #94a3b8; font-size: 15px;">TEMPERATURA: <span class="hud-value" style="color:#ffaa00;">OPTYMALNA</span></div>
        </div>
        <div id="gameCanvas"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ==========================================
        // BAZA BRONI (MAIN WEAPONS) - Mniejsze, szybsze
        // ==========================================
        const MASTER_WEAPONS = {
            minigun: { 
                id: 'minigun', 
                name: 'Vulcan Minigun', 
                type: 'physical',
                baseDamage: 12, 
                baseRange: 2000, 
                baseSpeed: 4000, 
                cooldown: 0.04,  // Ekstremalnie szybki
                spread: 0.04,
                vfxColor: '#ffaa00', // Żółto-pomarańczowy
                coreColor: '#ffffff',
                recoil: 3,
                shake: 2,
                impactScale: 0.2 // Było 0.4, zmniejszone o połowę
            },
            laser_cannon: { 
                id: 'laser_cannon', 
                name: 'Helios Laser', 
                type: 'energy',
                baseDamage: 40, 
                baseRange: 3000, 
                baseSpeed: 6000, 
                cooldown: 0.18,
                spread: 0.01,
                vfxColor: '#ff003c', // Karmazynowy czerwony
                coreColor: '#ffffff',
                recoil: 6,
                shake: 3,
                impactScale: 0.35 // Było 0.7, zmniejszone o połowę
            },
            ion_cannon: { 
                id: 'ion_cannon', 
                name: 'Tempest Ion', 
                type: 'shield',
                baseDamage: 25, 
                baseRange: 1800, 
                baseSpeed: 2500, 
                cooldown: 0.12, 
                spread: 0.02,
                vfxColor: '#00ccff', // Błękitny / Cyjan
                coreColor: '#ffffff',
                recoil: 4, 
                shake: 2.5,
                impactScale: 0.3 // Było 0.6, zmniejszone o połowę
            }
        };

        // ==========================================
        // STATE
        // ==========================================
        const state = {
            activeWeaponId: 'minigun',
            cooldowns: {},
            bullets: [],     
            particles: [],   
            explosions: [], 
            decals: [], 
            mouse: { x: 0, y: 0, isDown: false, screenX: 0, screenY: 0 },
            camera: { 
                z: 1400, targetZ: 1000, 
                x: 0, y: 0, 
                shake: 0, shakeVec: new THREE.Vector3() 
            },
            ship: { 
                barrelSpin: 0, // Dla miniguna
                barrelSpinSpeed: 0,
                flashStates: [0, 0, 0], // Muzzle flashes
                recoilHousing: 0, recoilBarrels: [0, 0, 0],
                currentFireIndex: 0
            },
            turret: {
                angle: 0
            },
            target: { x: 1400, y: 300, size: 100, mesh: null, hitFlash: 0 }, 
            lastTime: performance.now(),
            turretModels: {} // Słownik przechowujący obiekty wieżyczek
        };
        Object.keys(MASTER_WEAPONS).forEach(id => state.cooldowns[id] = 0);

        // ==========================================
        // THREE.JS SETUP
        // ==========================================
        const container = document.getElementById('gameCanvas');
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
        renderer.setSize(container.clientWidth, container.clientHeight);
        
        renderer.toneMapping = THREE.ACESFilmicToneMapping; 
        renderer.toneMappingExposure = 1.3;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFShadowMap;
        container.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020306);
        scene.fog = new THREE.FogExp2(0x020306, 0.00015); 

        const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 1, 25000);
        camera.position.set(0, 0, state.camera.z); 

        const renderScene = new RenderPass(scene, camera);
        
        // Zmniejszono parametry Blooma o połowę (Strength z 2.2 -> 1.1, Radius z 0.8 -> 0.4)
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.1, 0.4, 0.85);
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        const raycaster = new THREE.Raycaster();
        const planeZ0 = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        const targetVec = new THREE.Vector3();

        const ambientLight = new THREE.AmbientLight(0x1a2b3c, 1.5); 
        scene.add(ambientLight);
        
        const sunPos = new THREE.Vector3(-1200, 600, 400); 
        const dirLight = new THREE.DirectionalLight(0xddeeff, 4.0); 
        dirLight.position.copy(sunPos); 
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 10;
        dirLight.shadow.camera.far = 3000;
        dirLight.shadow.camera.left = -800;
        dirLight.shadow.camera.right = 800;
        dirLight.shadow.camera.top = 800;
        dirLight.shadow.camera.bottom = -800;
        dirLight.shadow.bias = -0.0005;
        scene.add(dirLight);

        // ==========================================
        // TEKSTURY PROCEDURALNE I BAZOWE MATERIAŁY
        // ==========================================
        function createRadialGradient() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(64, 64, 0, 64, 64, 64);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.2, 'rgba(255, 255, 255, 0.8)');
            gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.2)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 128, 128);
            return new THREE.CanvasTexture(canvas);
        }

        function createHexGridTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#05070a'; ctx.fillRect(0, 0, 512, 512);
            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 2;
            for(let i=0; i<512; i+=64) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 512); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(512, i); ctx.stroke();
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(60, 60); 
            return tex;
        }

        const particleTexture = createRadialGradient();
        const floorTexture = createHexGridTexture();
        const dummyObj = new THREE.Object3D(); 

        const matDarkMetal = new THREE.MeshPhysicalMaterial({ color: 0x111318, metalness: 0.8, roughness: 0.3, clearcoat: 0.2 });
        const matArmorPlate = new THREE.MeshPhysicalMaterial({ color: 0x242a35, metalness: 0.6, roughness: 0.5 });
        const matGunmetal = new THREE.MeshPhysicalMaterial({ color: 0x0a0a0c, metalness: 0.9, roughness: 0.2 });
        
        function getEmissiveMaterial(hexColor, intensity = 5.0, useTexture = false) {
            return new THREE.MeshStandardMaterial({
                color: 0x000000, emissive: new THREE.Color(hexColor), emissiveIntensity: intensity,
                transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, map: useTexture ? particleTexture : null
            });
        }

        const matSpark = getEmissiveMaterial('#ffaa44', 20.0, true);
        const matDebris = new THREE.MeshPhysicalMaterial({ color: 0x222222, metalness: 0.9, roughness: 0.4 });
        const matScorch = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.8, depthWrite: false, map: particleTexture });

        const geoSpark = new THREE.PlaneGeometry(8, 8);
        const geoTracerCore = new THREE.CylinderGeometry(1.5, 0.2, 120, 5); 
        const geoTracerGlow = new THREE.CylinderGeometry(4.0, 0.5, 140, 5);
        const geoSmoke = new THREE.PlaneGeometry(25, 25);
        const geoDebris = new THREE.TetrahedronGeometry(2); 
        const geoScorch = new THREE.PlaneGeometry(30, 30);
        const geoInstancedSpark = new THREE.PlaneGeometry(1, 0.2);

        const EXPLOSION_MATS = {};
        function getExpMats(hexColor) {
            if (!EXPLOSION_MATS[hexColor]) {
                const color = parseInt(hexColor.replace('#', '0x'));
                EXPLOSION_MATS[hexColor] = {
                    flash: new THREE.SpriteMaterial({ map: particleTexture, color: color, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true }),
                    core: new THREE.SpriteMaterial({ map: particleTexture, color: 0xffffff, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true }),
                    spark: new THREE.MeshBasicMaterial({ color: color, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true }),
                    smoke: new THREE.SpriteMaterial({ map: particleTexture, color: 0x030303, transparent: true, depthWrite: false, opacity: 0.6 }),
                    muzzleSpark: getEmissiveMaterial(hexColor, 15.0, true) 
                };
            }
            return EXPLOSION_MATS[hexColor];
        }

        const TRACER_MATS = {};
        function getTracerMats(weapon) {
            if (!TRACER_MATS[weapon.id]) {
                TRACER_MATS[weapon.id] = {
                    core: getEmissiveMaterial(weapon.coreColor, 50.0),
                    glow: getEmissiveMaterial(weapon.vfxColor, 10.0)
                };
            }
            return TRACER_MATS[weapon.id];
        }

        const sharedMuzzleSmokeMat = new THREE.SpriteMaterial({ map: particleTexture, color: 0x030303, transparent: true, depthWrite: false, opacity: 0.5 });

        // --- PODŁOGA ---
        const floorMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(24000, 24000),
            new THREE.MeshStandardMaterial({ 
                color: 0x080a0f, roughness: 0.2, metalness: 0.8, map: floorTexture, bumpMap: floorTexture, bumpScale: 0.02
            })
        );
        floorMesh.position.z = -15; 
        floorMesh.receiveShadow = true;
        scene.add(floorMesh);

        // --- MODEL STATKU ---
        const shipGroup = new THREE.Group();
        const shipMat = new THREE.MeshStandardMaterial({ 
            transparent: true, alphaTest: 0.1, roughness: 0.8, metalness: 0.2, side: THREE.DoubleSide
        });
        const shipMesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), shipMat);
        shipMesh.position.z = 0; 
        shipMesh.castShadow = true; shipMesh.receiveShadow = true;
        shipGroup.add(shipMesh);

        const textureLoader = new THREE.TextureLoader();
        textureLoader.load('https://raw.githubusercontent.com/bazylowybazyl/statki/refs/heads/main/assets/capital_ship_rect_v1.png', (tex) => {
            tex.colorSpace = THREE.SRGBColorSpace;
            shipMat.map = tex;
            shipMat.needsUpdate = true;
            shipMesh.geometry.dispose();
            shipMesh.geometry = new THREE.PlaneGeometry(tex.image.width, tex.image.height);
        });

        scene.add(shipGroup);

        // ==========================================
        // FABRYKI WIEŻYCZEK MAIN (2x mniejsze od starych)
        // ==========================================
        const turretParent = new THREE.Group();
        turretParent.position.set(0, 0, 5); 
        shipGroup.add(turretParent);

        const sharedTurretBase = new THREE.Mesh(new THREE.CylinderGeometry(15, 18, 8, 20), matDarkMetal);
        sharedTurretBase.rotation.x = Math.PI / 2;
        sharedTurretBase.position.z = 4;
        sharedTurretBase.castShadow = true; sharedTurretBase.receiveShadow = true;
        turretParent.add(sharedTurretBase);

        const yokeGroup = new THREE.Group();
        turretParent.add(yokeGroup);

        function createMuzzleFlash(colorHex) {
            const group = new THREE.Group();
            // Zmniejszono PlaneGeometry o połowę (było 30x30 i 15x15)
            const p1 = new THREE.Mesh(new THREE.PlaneGeometry(15, 15), getEmissiveMaterial(colorHex, 8.0, true));
            p1.rotation.y = Math.PI / 2;
            const p2 = p1.clone(); p2.rotation.x = Math.PI / 2;
            const core = new THREE.Mesh(new THREE.PlaneGeometry(7.5, 7.5), getEmissiveMaterial('#ffffff', 20.0, true));
            group.add(p1, p2, core);
            group.visible = false;
            return group;
        }

        // 1. Vulcan Minigun (Gatling, 1 punkt ognia, obrotowa lufa)
        function buildMinigun() {
            const tGroup = new THREE.Group();
            const housing = new THREE.Mesh(new THREE.BoxGeometry(26, 16, 14), matArmorPlate);
            housing.position.set(5, 0, 8);
            housing.castShadow = true; housing.receiveShadow = true;
            tGroup.add(housing);

            // Zmiana: Zagnieżdżone grupy, żeby oddzielić pochylenie od obrotu
            const barrelPivot = new THREE.Group();
            barrelPivot.rotation.z = -Math.PI / 2;
            barrelPivot.position.set(18, 0, 8); // Pozycja w housing'u

            const barrelSpinGroup = new THREE.Group();
            // Tworzymy obrotowy blok luf
            for(let i=0; i<6; i++) {
                const b = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 25, 8), matGunmetal);
                b.position.y = 12.5; // Przesunięcie połowy długości
                b.position.x = Math.cos((i/6)*Math.PI*2) * 3; // Promień ułożenia luf
                b.position.z = Math.sin((i/6)*Math.PI*2) * 3;
                b.castShadow = true;
                barrelSpinGroup.add(b);
            }
            
            barrelPivot.add(barrelSpinGroup);
            tGroup.add(barrelPivot);

            const mf = createMuzzleFlash('#ffaa00');
            mf.position.set(45, 0, 8);
            tGroup.add(mf);

            return { group: tGroup, housing, barrels: [barrelPivot], spinGroup: barrelSpinGroup, mFlashes: [mf], firePoints: [new THREE.Vector3(45, 0, 13)] };
        }

        // 2. Helios Laser (Podwójne smukłe lufy)
        function buildLaserCannon() {
            const tGroup = new THREE.Group();
            const housing = new THREE.Mesh(new THREE.BoxGeometry(20, 22, 12), matArmorPlate);
            housing.position.set(2, 0, 8);
            housing.castShadow = true; housing.receiveShadow = true;
            tGroup.add(housing);

            const createLaserBarrel = (yPos) => {
                const sys = new THREE.Group();
                const b1 = new THREE.Mesh(new THREE.BoxGeometry(35, 3, 4), matGunmetal); b1.position.x = 17.5; b1.castShadow = true;
                const glow = new THREE.Mesh(new THREE.BoxGeometry(30, 1.5, 4.2), getEmissiveMaterial('#ff003c', 5.0)); glow.position.x = 17.5;
                sys.add(b1, glow);
                sys.position.set(12, yPos, 8);
                return sys;
            }

            const bL = createLaserBarrel(6);
            const bR = createLaserBarrel(-6);
            tGroup.add(bL, bR);

            const mfL = createMuzzleFlash('#ff003c'); mfL.position.set(47, 6, 8);
            const mfR = createMuzzleFlash('#ff003c'); mfR.position.set(47, -6, 8);
            tGroup.add(mfL, mfR);

            return { group: tGroup, housing, barrels: [bL, bR], mFlashes: [mfL, mfR], firePoints: [new THREE.Vector3(47, 6, 13), new THREE.Vector3(47, -6, 13)] };
        }

        // 3. Tempest Ion Cannon (Kompaktowa, cewkowa)
        function buildIonCannon() {
            const tGroup = new THREE.Group();
            const housing = new THREE.Mesh(new THREE.BoxGeometry(18, 16, 16), matArmorPlate);
            housing.position.set(2, 0, 8);
            housing.castShadow = true; housing.receiveShadow = true;
            tGroup.add(housing);

            const barrelSys = new THREE.Group();
            const bMain = new THREE.Mesh(new THREE.CylinderGeometry(4, 5, 20, 12), matGunmetal); bMain.position.y = 10; bMain.castShadow = true;
            const ring = new THREE.Mesh(new THREE.TorusGeometry(5, 1, 8, 16), getEmissiveMaterial('#00ccff', 8.0)); ring.position.y = 16; ring.rotation.x = Math.PI/2;
            barrelSys.add(bMain, ring);
            barrelSys.rotation.z = -Math.PI / 2;
            barrelSys.position.set(11, 0, 8);
            tGroup.add(barrelSys);

            const mf = createMuzzleFlash('#00ccff');
            mf.position.set(32, 0, 8);
            tGroup.add(mf);

            return { group: tGroup, housing, barrels: [barrelSys], mFlashes: [mf], firePoints: [new THREE.Vector3(32, 0, 13)] };
        }

        state.turretModels['minigun'] = buildMinigun();
        state.turretModels['laser_cannon'] = buildLaserCannon();
        state.turretModels['ion_cannon'] = buildIonCannon();

        Object.values(state.turretModels).forEach(t => yokeGroup.add(t.group));

        function switchWeapon(id) {
            state.activeWeaponId = id;

            state.ship.flashStates = [0,0,0];
            state.ship.recoilHousing = 0;

        // --- ZOPTYMALIZOWANA FABRYKA EKSPLOZJI (Zróżnicowana po typie broni) ---
        function spawnExplosion(x, y, z, colorHex, scale = 1.0, weaponType = 'physical') {
            const group = new THREE.Group();
            group.position.set(x, y, z);
            scene.add(group);

            const mats = getExpMats(colorHex);
            const duration = weaponType === 'energy' ? 0.6 : 0.4;
            let time = 0;

            const flash = new THREE.Sprite(mats.flash);
            flash.scale.setScalar(40 * scale);
            group.add(flash);

            const core = new THREE.Sprite(mats.core);
            core.scale.setScalar(20 * scale);
            group.add(core);

            // Różne ilości iskier w zależności od typu
            let sparkCount = 20;
            if (weaponType === 'energy') sparkCount = 10; // Długie smugi
            if (weaponType === 'shield') sparkCount = 50; // Dużo drobnych

            const sparks = new THREE.InstancedMesh(geoInstancedSpark, mats.spark, sparkCount);
            sparks.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
            group.add(sparks);

            const sparkData = [];
            for(let i=0; i<sparkCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                let speed = (200 + Math.random() * 400) * scale;
                if(weaponType === 'shield') speed *= 1.5; // Szybsze iskry z jonowego
                sparkData.push({
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    vz: (Math.random() - 0.2) * 500 * scale,
                    life: 0.15 + Math.random() * duration,
                    age: 0, x: 0, y: 0, z: 0
                });
            }

            const smokes = [];
            // Energetyczne i Jonowe generują minimalny lub zerowy dym
            if (weaponType === 'physical' || weaponType === 'energy') {
                const smokeCount = weaponType === 'physical' ? 6 * scale : 2 * scale;
                for(let i=0; i<smokeCount; i++) {
                    const smoke = new THREE.Sprite(mats.smoke);
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 100 * scale;
                    smoke.position.set((Math.random()-0.5)*10, (Math.random()-0.5)*10, (Math.random()-0.5)*10);
                    const baseScale = (10 + Math.random()*8) * scale;
                    smoke.scale.setScalar(baseScale);
                    smoke.userData = {
                        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, vz: Math.random() * 40,
                        growth: 1.5 + Math.random() * 1.5, life: duration + 0.4, age: 0, baseScale: baseScale
                    };
                    smokes.push(smoke);
                    group.add(smoke);
                }
            }

            if(weaponType === 'physical') spawnScorchMark(x, y, scale * (0.6 + Math.random()*0.4));

            const update = (dt) => {
                time += dt;
                
                const flashFade = Math.max(0, 1 - time / (duration * 0.4));
                // Dla ion cannon większy, krótszy błysk (EMP)
                const flashSize = weaponType === 'shield' ? 60 : 40;
                flash.scale.setScalar(flashSize * scale * (1 + time * 6) * flashFade);

                const coreFade = Math.max(0, 1 - time / (duration * 0.25));
                core.scale.setScalar(20 * scale * Math.max(0.1, 1 - time * 4) * coreFade);

                for (let i = 0; i < smokes.length; i++) {
                    const sm = smokes[i];
                    sm.userData.age += dt;
                    sm.position.x += sm.userData.vx * dt;
                    sm.position.y += sm.userData.vy * dt;
                    sm.position.z += sm.userData.vz * dt;
                    sm.userData.vx *= 0.92; sm.userData.vy *= 0.92;
                    
                    const smokeProgress = Math.min(1, sm.userData.age / sm.userData.life);
                    const smokeFade = 1 - Math.pow(smokeProgress, 4); 
                    const currentGrowth = 1 + sm.userData.age * sm.userData.growth;
                    sm.scale.setScalar(sm.userData.baseScale * currentGrowth * smokeFade);
                }

                for (let i = 0; i < sparkCount; i++) {
                    const s = sparkData[i];
                    s.age += dt;
                    if (s.age < s.life) {
                        s.x += s.vx * dt; s.y += s.vy * dt; s.z += s.vz * dt;
                        s.vx *= 0.95; s.vy *= 0.95; 
                        s.vz -= 1200 * dt; 
                        
                        if(z + s.z < -14) { 
                            s.z = -14 - z; 
                            s.vz *= -0.5; s.vx *= 0.6; s.vy *= 0.6;
                        }

                        dummyObj.position.set(s.x, s.y, s.z);
                        dummyObj.rotation.z = Math.atan2(s.vy, s.vx); 
                        
                        const speedMag = Math.sqrt(s.vx*s.vx + s.vy*s.vy + s.vz*s.vz);
                        // Rozciąganie w zależności od typu
                        let stretchMult = 0.015;
                        if(weaponType === 'energy') stretchMult = 0.03;
                        if(weaponType === 'shield') stretchMult = 0.005;

                        const stretch = Math.max(1, speedMag * stretchMult); 
                        const shrink = 1 - (s.age / s.life);
                        
                        dummyObj.scale.set(stretch * shrink * 3, 1 * shrink, 1);
                    } else {
                        dummyObj.scale.set(0,0,0);
                    }
                    dummyObj.updateMatrix();
                    sparks.setMatrixAt(i, dummyObj.matrix);
                }
                sparks.instanceMatrix.needsUpdate = true;

                return time > duration + 0.6; 
            };

            const dispose = () => { scene.remove(group); };
            state.explosions.push({ update, dispose });
        }

        function createTracerMesh(weapon) {
            const group = new THREE.Group();
            const mats = getTracerMats(weapon);
            
            // Zmniejszono mnożniki wielkości pocisków o połowę
            let lengthMult = 0.5; let widthMult = 0.5;
            if (weapon.type === 'energy') { 
                lengthMult = 1.75; widthMult = 0.25; 
                
                // Dodajemy jasną główkę z przodu lasera (Efekt Blaster Bolt)
                const headCore = new THREE.Sprite(new THREE.SpriteMaterial({ map: particleTexture, color: 0xffffff, blending: THREE.AdditiveBlending, depthWrite: false }));
                headCore.scale.set(15, 15, 1);
                headCore.position.x = 60 * lengthMult; 
                
                const headGlow = new THREE.Sprite(new THREE.SpriteMaterial({ map: particleTexture, color: parseInt(weapon.vfxColor.replace('#','0x')), blending: THREE.AdditiveBlending, depthWrite: false }));
                headGlow.scale.set(35, 35, 1);
                headGlow.position.x = 60 * lengthMult;
                
                group.add(headCore, headGlow);
            } // Było 3.5 i 0.5
            else if (weapon.type === 'shield') { lengthMult = 0.4; widthMult = 1.0; } // Było 0.8 i 2.0
            else if (weapon.type === 'physical') { lengthMult = 0.6; widthMult = 0.35; } // Było 1.2 i 0.7

            const core = new THREE.Mesh(geoTracerCore, mats.core);
            core.rotation.z = -Math.PI / 2;
            core.scale.set(widthMult, lengthMult, widthMult);
            
            const glow = new THREE.Mesh(geoTracerGlow, mats.glow);
            glow.rotation.z = -Math.PI / 2;
            glow.position.x = -5 * lengthMult; 
            glow.scale.set(widthMult, lengthMult, widthMult);
            
            group.add(core, glow);
            return group;
        }

        function executeShot(weapon) {
            const tModel = state.turretModels[weapon.id];
            
            // Obsługa wielu luf / punktów ognia
            const fireIndex = state.ship.currentFireIndex;
            state.ship.currentFireIndex = (fireIndex + 1) % tModel.firePoints.length;
            
            const localFirePoint = tModel.firePoints[fireIndex];
            
            // Transformacja punktu ognia uwzględniając pozycję na statku (Z=5)
            const gunOffset = new THREE.Vector3(localFirePoint.x, localFirePoint.y, localFirePoint.z); 
            gunOffset.applyEuler(new THREE.Euler(0, 0, state.turret.angle)); // ZMIANA: używamy kąta wieży, nie statku
            const startX = shipGroup.position.x + turretParent.position.x + gunOffset.x;
            const startY = shipGroup.position.y + turretParent.position.y + gunOffset.y;

            // Odrzut dla aktywnej wieżyczki
            state.ship.recoilHousing = weapon.recoil * 0.4;
            state.ship.recoilBarrels[fireIndex] = weapon.recoil;
            state.ship.flashStates[fireIndex] = 1.0;
            
            const flashMesh = tModel.mFlashes[fireIndex];
            flashMesh.visible = true;
            flashMesh.children[0].material.emissive.setHex(parseInt(weapon.vfxColor.replace('#','0x')));
            flashMesh.children[1].material.emissive.setHex(parseInt(weapon.vfxColor.replace('#','0x')));
            flashMesh.rotation.x = Math.random() * Math.PI; 

            state.camera.shake += weapon.shake;

            // ZMIANA: Kąt pocisku to teraz bezwzględnie kąt lufy (z lekkim rozrzutem spread)
            const baseAngle = state.turret.angle;
            const finalAngle = baseAngle + (Math.random() * 2 - 1) * weapon.spread;

            // Iskry z lufy - zmniejszono ich rozmiar z 1.0 na 0.5
            for(let i=0; i<3; i++) {
                spawnSpark(startX, startY, localFirePoint.z, 
                    Math.cos(finalAngle)*600 + (Math.random()-0.5)*200, 
                    Math.sin(finalAngle)*600 + (Math.random()-0.5)*200, 
                    (Math.random()-0.5)*100, 
                    0.2, 0.5, weapon.vfxColor
                );
            }
            if(weapon.type === 'physical') { // Dym tylko dla fizycznych
                spawnSmoke(startX + Math.cos(finalAngle)*20, startY + Math.sin(finalAngle)*20, localFirePoint.z, 
                    Math.cos(finalAngle)*80, Math.sin(finalAngle)*80, 0.6, 1.5
                );
            }

            const mesh = createTracerMesh(weapon);
            mesh.position.set(startX, startY, localFirePoint.z); 
            scene.add(mesh);

            state.bullets.push({
                mesh, weaponType: weapon.type, scale: weapon.impactScale, colorHex: weapon.vfxColor,
                x: startX, y: startY,
                vx: Math.cos(finalAngle) * weapon.baseSpeed,
                vy: Math.sin(finalAngle) * weapon.baseSpeed,
                life: weapon.baseRange / weapon.baseSpeed
            });
        }

        // ==========================================
        // GŁÓWNA PĘTLA LOGIKI
        // ==========================================
        function updateLogic(dt) {
            const targetCamX = state.mouse.screenX * 100;
            const targetCamY = state.mouse.screenY * 100;
            state.camera.x += (targetCamX - state.camera.x) * dt * 2.0;
            state.camera.y += (targetCamY - state.camera.y) * dt * 2.0;
            state.camera.z += (state.camera.targetZ - state.camera.z) * dt * 5.0;
            
            if (state.camera.shake > 0.1) {
                state.camera.shakeVec.set((Math.random() - 0.5) * state.camera.shake, (Math.random() - 0.5) * state.camera.shake, 0);
                state.camera.shake *= 0.85; 
            } else { state.camera.shakeVec.set(0,0,0); }
            
            camera.position.set(state.camera.x + state.camera.shakeVec.x, state.camera.y + state.camera.shakeVec.y, state.camera.z);
            camera.lookAt(state.camera.x * 0.5, state.camera.y * 0.5, 0);

            raycaster.setFromCamera(new THREE.Vector2(state.mouse.screenX, state.mouse.screenY), camera);
            raycaster.ray.intersectPlane(planeZ0, targetVec);
            state.mouse.x = targetVec.x; state.mouse.y = targetVec.y;
            
            crosshair.position.set(state.mouse.x, state.mouse.y, 25);
            crosshair.rotation.z -= dt * 2.0;
            crosshair.scale.setScalar(1.0 + Math.sin(state.lastTime * 0.005) * 0.1);

            // ZMIANA: Obrót dla wieżyczki zamiast całego statku
            const targetAngle = Math.atan2(state.mouse.y - turretParent.position.y, state.mouse.x - turretParent.position.x);
            const deltaAngle = targetAngle - state.turret.angle;
            const normalizedDelta = Math.atan2(Math.sin(deltaAngle), Math.cos(deltaAngle));
            state.turret.angle += normalizedDelta * dt * 8.0; // Płynne dołączanie do kąta myszy
            turretParent.rotation.z = state.turret.angle;     // Obracamy tylko wieżyczkę

            // Sprężynowy odrzut dla aktywnej wieżyczki
            state.ship.recoilHousing -= state.ship.recoilHousing * 10 * dt;
            const tModel = state.turretModels[state.activeWeaponId];
            if(tModel) {
                tModel.housing.position.x = tModel.housing.userData.baseX || tModel.housing.position.x; // Zapisz bazę
                if(!tModel.housing.userData.baseX) tModel.housing.userData.baseX = tModel.housing.position.x;
                tModel.housing.position.x = tModel.housing.userData.baseX - state.ship.recoilHousing;

                for(let i=0; i<tModel.barrels.length; i++) {
                    state.ship.recoilBarrels[i] -= state.ship.recoilBarrels[i] * 15 * dt;
                    const b = tModel.barrels[i];
                    if(!b.userData.baseX) b.userData.baseX = b.position.x;
                    b.position.x = b.userData.baseX - state.ship.recoilBarrels[i];
                }

                for(let i=0; i<tModel.mFlashes.length; i++) {
                    if(state.ship.flashStates[i] > 0) {
                        state.ship.flashStates[i] -= dt * 20;
                        const scale = 1 + state.ship.flashStates[i];
                        tModel.mFlashes[i].scale.setScalar(scale);
                        if(state.ship.flashStates[i] <= 0) tModel.mFlashes[i].visible = false;
                    }
                }
            }

            // Rozkręcanie luf Miniguna
            if (state.activeWeaponId === 'minigun') {
                if (state.mouse.isDown) state.ship.barrelSpinSpeed = Math.min(state.ship.barrelSpinSpeed + dt * 10, 15);
                else state.ship.barrelSpinSpeed = Math.max(state.ship.barrelSpinSpeed - dt * 5, 0);
                state.ship.barrelSpin += state.ship.barrelSpinSpeed * dt;
                
                if(state.turretModels['minigun'].spinGroup) {
                    state.turretModels['minigun'].spinGroup.rotation.y = state.ship.barrelSpin; // Idealny obrót wokół zagnieżdżonej osi Y
                }
            }

            state.target.mesh.rotation.x += dt * 0.4;
            state.target.mesh.rotation.y += dt * 0.6;
            if (state.target.hitFlash > 0) {
                state.target.hitFlash -= dt * 10; 
                state.target.mesh.material.emissive.setHex(0xffaa44);
                state.target.mesh.material.emissiveIntensity = Math.max(0, state.target.hitFlash) * 10.0;
            } else state.target.mesh.material.emissiveIntensity = 0;

            if (state.mouse.isDown) {
                const w = MASTER_WEAPONS[state.activeWeaponId];
                if (state.cooldowns[w.id] <= 0) {
                    executeShot(w);
                    state.cooldowns[w.id] = w.cooldown;
                }
            }
            for (let id in state.cooldowns) { if (state.cooldowns[id] > 0) state.cooldowns[id] -= dt; }

            for (let i = state.bullets.length - 1; i >= 0; i--) {
                const b = state.bullets[i];

                if (b.weaponType === 'physical' && Math.random() > 0.5) {
                    spawnSmoke(b.x, b.y, 20, -b.vx*0.02, -b.vy*0.02, 0.2, 0.5 * b.scale);
                }

                // Dodajemy efekt cząsteczek (trail) gubionych w locie przez laser
                if (b.weaponType === 'energy' && Math.random() > 0.4) {
                    spawnSpark(b.x, b.y, 20, 
                        -b.vx * 0.1 + (Math.random()-0.5)*200, 
                        -b.vy * 0.1 + (Math.random()-0.5)*200, 
                        (Math.random()-0.5)*50, 
                        0.15, 0.5, b.colorHex
                    );
                }

                b.x += b.vx * dt;
                b.y += b.vy * dt;
                b.life -= dt;

                b.mesh.position.set(b.x, b.y, 20); 
                b.mesh.rotation.z = Math.atan2(b.vy, b.vx);

                const tdx = b.x - state.target.x;
                const tdy = b.y - state.target.y;
                let hitTarget = false;
                
                if (Math.abs(tdx) < state.target.size / 1.5 && Math.abs(tdy) < state.target.size / 1.5) {
                    b.life = 0; 
                    state.target.hitFlash = 1.0; 
                    hitTarget = true;
                    state.target.mesh.position.x += b.vx * 0.003 * b.scale;
                    state.target.mesh.position.y += b.vy * 0.003 * b.scale;
                }

                if (b.life <= 0) {
                    if (hitTarget) {
                        spawnExplosion(b.x, b.y, 10, b.colorHex, b.scale, b.weaponType);
                        state.camera.shake += 4 * b.scale;
                    }
                    scene.remove(b.mesh);
                    state.bullets.splice(i, 1);
                }
            }
            
            state.target.mesh.position.lerp(new THREE.Vector3(state.target.x, state.target.y, 10), dt * 4);

            for (let i = state.particles.length - 1; i >= 0; i--) {
                const p = state.particles[i];
                p.life -= dt;
                
                if (p.type === 'spark') {
                    p.x += p.vx * dt; p.y += p.vy * dt; p.mesh.position.z += p.vz * dt;
                    p.vx *= 0.92; p.vy *= 0.92; p.vz -= 800 * dt; 
                    if (p.mesh.position.z < -14) { p.mesh.position.z = -14; p.vz = Math.abs(p.vz) * 0.5; p.vx *= 0.7; p.vy *= 0.7; }
                    p.mesh.position.set(p.x, p.y, p.mesh.position.z);
                    p.mesh.scale.setScalar(p.size * (p.life / p.maxLife));
                } 
                else if (p.type === 'smoke') {
                    p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.95; p.vy *= 0.95;
                    p.mesh.position.set(p.x, p.y, p.mesh.position.z);
                    const progress = 1.0 - (p.life / p.maxLife);
                    p.mesh.scale.setScalar(p.size * (1.0 + progress * 2) * (1.0 - Math.pow(progress, 3))); 
                }

                if (p.life <= 0) { scene.remove(p.mesh); state.particles.splice(i, 1); }
            }

            for (let i = state.explosions.length - 1; i >= 0; i--) {
                const exp = state.explosions[i];
                if (exp.update(dt)) { exp.dispose(); state.explosions.splice(i, 1); }
            }

            for (let i = state.decals.length - 1; i >= 0; i--) {
                const d = state.decals[i];
                d.life -= dt;
                if(d.life < 2.0) d.mesh.scale.setScalar(d.initialScale * (d.life / 2.0)); 
                if (d.life <= 0) { scene.remove(d.mesh); state.decals.splice(i, 1); }
            }

            bulletCountEl.innerText = state.bullets.length;
            particleCountEl.innerText = state.particles.length + state.decals.length;
        }

        function animate() {
            requestAnimationFrame(animate);
            const now = performance.now();
            const dt = Math.min((now - state.lastTime) / 1000, 0.1); 
            state.lastTime = now;
            updateLogic(dt);
            composer.render();
        }

        function precompileShaders() {
            const dummyGroup = new THREE.Group();
            dummyGroup.position.set(0, 0, -10000); 

            Object.values(MASTER_WEAPONS).forEach(w => {
                const tMats = getTracerMats(w);
                dummyGroup.add(new THREE.Mesh(geoTracerCore, tMats.core));
                dummyGroup.add(new THREE.Mesh(geoTracerGlow, tMats.glow));

                const eMats = getExpMats(w.vfxColor);
                dummyGroup.add(new THREE.Sprite(eMats.flash));
                dummyGroup.add(new THREE.Sprite(eMats.core));
                dummyGroup.add(new THREE.Sprite(eMats.smoke));
                dummyGroup.add(new THREE.Mesh(geoSpark, eMats.muzzleSpark));
                dummyGroup.add(new THREE.InstancedMesh(geoInstancedSpark, eMats.spark, 1));
            });

            dummyGroup.add(new THREE.Mesh(geoScorch, matScorch));
            dummyGroup.add(new THREE.Sprite(sharedMuzzleSmokeMat));
            dummyGroup.add(new THREE.Mesh(geoDebris, matDebris));

            scene.add(dummyGroup);
            renderer.compile(scene, camera);
            scene.remove(dummyGroup);
        }

        initUI();
        precompileShaders();
        animate();
    </script>
</body>
</html>
