<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symulator Eksplozji 3D - YAMATO ARTILLERY IMPACT</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            bottom: 20px;
            left: 20px;
            pointer-events: none;
            background: rgba(5, 10, 30, 0.85);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid #3388ff;
            box-shadow: 0 4px 25px rgba(50,150,255,0.3);
            backdrop-filter: blur(4px);
        }
        h1 { margin: 0 0 10px 0; font-size: 1.2rem; color: #55aaff; text-transform: uppercase; letter-spacing: 2px;}
        p { margin: 5px 0; font-size: 0.9rem; color: #cce0ff; }
        .highlight { color: #99ccff; font-weight: bold; }

        #tuning-ui {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(5, 10, 30, 0.85);
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid #3388ff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto;
            width: 280px;
            backdrop-filter: blur(4px);
            max-height: 80vh;
            overflow-y: auto;
        }
        .tune-row { margin-bottom: 12px; display: flex; flex-direction: column; }
        .tune-row-header { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px; color: #aaccff; }
        .tune-row input[type=range] { width: 100%; cursor: pointer; accent-color: #3388ff; }
        #copy-btn {
            width: 100%; padding: 10px; margin-top: 10px;
            background: #112244; color: white; border: 1px solid #3388ff;
            border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        #copy-btn:hover { background: #224488; }
        #bg-label:hover { background: #224488 !important; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="ui">
        <h1>Yamato: Trafienie Artyleryjskie</h1>
        <p>LPM - Detonacja pocisku w miejscu kliknięcia</p>
        <p>PPM - Przesuwanie kamery | Kółko - Zoom</p>
        <p style="font-size: 0.8em; color: #aacfff; margin-top: 10px;">
            <span class="highlight">Punch + Fragmenty + Łańcuch wtórnych</span><br>
            Kanoniczny styl artyleryjski, nie plazma.
        </p>
    </div>

    <div id="tuning-ui">
        <h3 style="margin-top:0; margin-bottom:15px; font-size:1.1rem; color:#fff; text-align:center;">Parametry Trafienia</h3>

        <div class="tune-row">
            <div class="tune-row-header"><label>Rozciągnięcie Smugi</label><span id="val-stretch">1.20</span></div>
            <input type="range" id="flame-stretch" min="0.0" max="6.0" step="0.1" value="1.2">
        </div>
        <div class="tune-row">
            <div class="tune-row-header"><label>Jasność HDR (Mnożnik)</label><span id="val-hdr">2.50</span></div>
            <input type="range" id="flame-hdr" min="0.5" max="15.0" step="0.5" value="2.5">
        </div>
        <div class="tune-row">
            <div class="tune-row-header"><label>Skala Wybuchu</label><span id="val-explosionSize">1.00</span></div>
            <input type="range" id="flame-explosionSize" min="0.2" max="3.0" step="0.1" value="1.0">
        </div>

        <div class="tune-row">
            <div class="tune-row-header"><label>Bloom Siła</label><span id="val-bloomStrength">2.20</span></div>
            <input type="range" id="flame-bloomStrength" min="0.0" max="5.0" step="0.1" value="2.2">
        </div>
        <div class="tune-row">
            <div class="tune-row-header"><label>Bloom Promień</label><span id="val-bloomRadius">0.75</span></div>
            <input type="range" id="flame-bloomRadius" min="0.0" max="2.0" step="0.05" value="0.75">
        </div>
        <div class="tune-row">
            <div class="tune-row-header"><label>Bloom Próg</label><span id="val-bloomThreshold">0.10</span></div>
            <input type="range" id="flame-bloomThreshold" min="0.0" max="1.0" step="0.05" value="0.10">
        </div>

        <div class="tune-row" style="margin-top: 15px;">
            <label for="bg-upload" id="bg-label" style="cursor:pointer; background: #112244; padding: 10px; text-align: center; border: 1px solid #3388ff; border-radius: 4px; font-weight: bold; transition: 0.2s;">Wgraj własne tło (PNG/JPG)</label>
            <input type="file" id="bg-upload" accept="image/png, image/jpeg" style="display: none;">
        </div>

        <button id="copy-btn">Kopiuj Ustawienia</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, composer, controls, bloomPass;
        let rtTexture;
        let lastTime;
        let globalTime = 0;
        let screenShake = 0;

        let fireParticleSystem;
        let smokeParticleSystem;
        let distortionManager;
        let targetDistance = 0;
        let groundPlaneMesh;
        let nebulaMesh;

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.FlameSettings = {
            stretchMult: 1.2,
            velMult: 0.15,
            startSize: 80.0,
            growth: 1.0,
            life: 0.30,
            smokeSize: 250.0,
            hdrIntensity: 2.5,
            fireAlpha: 0.85,
            explosionSize: 1.0,
            bloomStrength: 2.2,
            bloomRadius: 0.75,
            bloomThreshold: 0.10
        };

        const noiseChunk = `
            float hash(float n) { return fract(sin(n) * 43758.5453123); }
            float noise(vec3 x) {
                vec3 p = floor(x);
                vec3 f = fract(x);
                f = f * f * (3.0 - 2.0 * f);
                float n = p.x + p.y * 57.0 + 113.0 * p.z;
                return mix(mix(mix(hash(n + 0.0), hash(n + 1.0), f.x),
                               mix(hash(n + 57.0), hash(n + 58.0), f.x), f.y),
                           mix(mix(hash(n + 113.0), hash(n + 114.0), f.x),
                               mix(hash(n + 170.0), hash(n + 171.0), f.x), f.y), f.z);
            }
            float fbm(vec3 p) {
                float f = 0.0;
                f += 0.5000 * noise(p); p *= 2.02;
                f += 0.2500 * noise(p); p *= 2.03;
                f += 0.1250 * noise(p); p *= 2.01;
                return f;
            }
        `;

        function setupTuningUI() {
            const bindSlider = (id, key, valId) => {
                const el = document.getElementById(id);
                const valEl = document.getElementById(valId);
                el.value = window.FlameSettings[key];
                valEl.innerText = window.FlameSettings[key].toFixed(2);

                el.addEventListener('input', (e) => {
                    const val = parseFloat(e.target.value);
                    window.FlameSettings[key] = val;
                    valEl.innerText = val.toFixed(2);

                    const uniformsToUpdate = ['u_' + key];
                    [fireParticleSystem, smokeParticleSystem].forEach(sys => {
                        if (sys && sys.material) {
                            uniformsToUpdate.forEach(u => {
                                if(sys.material.uniforms[u]) sys.material.uniforms[u].value = val;
                            });
                        }
                    });
                });
            };

            const bindBloomSlider = (id, key, valId, bloomProp) => {
                const el = document.getElementById(id);
                const valEl = document.getElementById(valId);
                el.value = window.FlameSettings[key];
                valEl.innerText = window.FlameSettings[key].toFixed(2);

                el.addEventListener('input', (e) => {
                    const val = parseFloat(e.target.value);
                    window.FlameSettings[key] = val;
                    valEl.innerText = val.toFixed(2);
                    if (bloomPass) {
                        bloomPass[bloomProp] = val;
                    }
                });
            };

            bindSlider('flame-stretch', 'stretchMult', 'val-stretch');
            bindSlider('flame-hdr', 'hdrIntensity', 'val-hdr');
            bindSlider('flame-explosionSize', 'explosionSize', 'val-explosionSize');

            bindBloomSlider('flame-bloomStrength', 'bloomStrength', 'val-bloomStrength', 'strength');
            bindBloomSlider('flame-bloomRadius', 'bloomRadius', 'val-bloomRadius', 'radius');
            bindBloomSlider('flame-bloomThreshold', 'bloomThreshold', 'val-bloomThreshold', 'threshold');

            document.getElementById('copy-btn').addEventListener('click', () => {
                navigator.clipboard.writeText(JSON.stringify(window.FlameSettings, null, 2));
            });
        }

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050a1a, 0.000002);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 10, 400000);
            camera.position.set(0, -100, 30000);

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance', desynchronized: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.body.appendChild(renderer.domElement);

            rtTexture = new THREE.WebGLRenderTarget(
                window.innerWidth, window.innerHeight,
                { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter, format: THREE.RGBAFormat }
            );

            controls = new OrbitControls(camera, renderer.domElement);
            controls.mouseButtons = { LEFT: null, MIDDLE: THREE.MOUSE.ROTATE, RIGHT: THREE.MOUSE.PAN };
            controls.enableZoom = false;
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.panSpeed = 2.5;
            controls.minDistance = 2000;
            controls.maxDistance = 150000;

            const renderScene = new RenderPass(scene, camera);
            bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                window.FlameSettings.bloomStrength,
                window.FlameSettings.bloomRadius,
                window.FlameSettings.bloomThreshold
            );
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            const planeGeo = new THREE.PlaneGeometry(2000000, 2000000);
            const planeMat = new THREE.MeshBasicMaterial({ visible: false });
            groundPlaneMesh = new THREE.Mesh(planeGeo, planeMat);
            groundPlaneMesh.position.z = -10;
            scene.add(groundPlaneMesh);

            const bgPlaneGeo = new THREE.PlaneGeometry(300000, 300000);
            const bgPlaneMat = new THREE.MeshBasicMaterial({
                color: 0x080820,
                depthWrite: false
            });
            nebulaMesh = new THREE.Mesh(bgPlaneGeo, bgPlaneMat);
            nebulaMesh.position.z = -5000;
            scene.add(nebulaMesh);

            document.getElementById('bg-upload').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const texture = new THREE.Texture(img);
                        texture.needsUpdate = true;
                        texture.colorSpace = THREE.SRGBColorSpace;

                        const aspect = img.width / img.height;
                        const newPlaneGeo = new THREE.PlaneGeometry(300000 * aspect, 300000);
                        nebulaMesh.geometry.dispose();
                        nebulaMesh.geometry = newPlaneGeo;

                        bgPlaneMat.map = texture;
                        bgPlaneMat.color.setHex(0xaaaaaa);
                        bgPlaneMat.needsUpdate = true;
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });

            fireParticleSystem = new GPUInstancedParticleManager(scene, 80000, THREE.AdditiveBlending);
            smokeParticleSystem = new GPUParticleManager(scene, 15000, THREE.NormalBlending);

            distortionManager = new DistortionManager(scene, 8, rtTexture);

            setupTuningUI();

            targetDistance = camera.position.distanceTo(controls.target);

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousedown', onMouseDown);
            window.addEventListener('contextmenu', e => e.preventDefault());
            window.addEventListener('wheel', (e) => {
                targetDistance += e.deltaY * 50.0;
                targetDistance = THREE.MathUtils.clamp(targetDistance, controls.minDistance, controls.maxDistance);
            }, { passive: false });
        }

        // --- DISTORTION MANAGER (mała, krótka fala uderzeniowa - punch) ---
        class DistortionManager {
            constructor(scene, maxWaves, rtTexture) {
                this.waves = [];
                const geo = new THREE.SphereGeometry(1, 24, 24);

                for(let i=0; i<maxWaves; i++) {
                    const mat = new THREE.ShaderMaterial({
                        uniforms: {
                            tDiffuse: { value: rtTexture.texture },
                            progress: { value: 0.0 }
                        },
                        vertexShader: `
                            varying vec4 vScreenPos; varying vec3 vNormal; varying vec3 vViewPosition;
                            void main() {
                                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                                gl_Position = projectionMatrix * mvPosition;
                                vScreenPos = gl_Position;
                                vNormal = normalize(normalMatrix * normal);
                                vViewPosition = -mvPosition.xyz;
                            }
                        `,
                        fragmentShader: `
                            uniform sampler2D tDiffuse; uniform float progress;
                            varying vec4 vScreenPos; varying vec3 vNormal; varying vec3 vViewPosition;

                            float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }

                            void main() {
                                vec2 uv = (vScreenPos.xy / vScreenPos.w) * 0.5 + 0.5;
                                vec3 normal = normalize(vNormal);
                                vec3 viewDir = normalize(vViewPosition);

                                // Wąski, ostry pierścień - krótki impuls zamiast bańki plazmy
                                float fresnel = 1.0 - abs(dot(normal, viewDir));
                                float ring = pow(fresnel, 8.0);
                                float strength = (1.0 - progress) * 0.18;

                                vec2 distortion = normal.xy * ring * strength;
                                vec4 bgColor = texture2D(tDiffuse, uv - distortion);

                                gl_FragColor = vec4(bgColor.rgb, 1.0);
                            }
                        `,
                        transparent: true,
                        depthWrite: false
                    });

                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.visible = false;
                    scene.add(mesh);

                    this.waves.push({ mesh, active: false, age: 0, maxLife: 0.45, targetScale: 5000 });
                }
            }

            spawn(x, y, z, maxScale, life) {
                const wave = this.waves.find(w => !w.active);
                if (!wave) return;

                wave.active = true;
                wave.age = 0;
                wave.maxLife = life;
                wave.targetScale = maxScale;
                wave.mesh.position.set(x, y, z);
                wave.mesh.scale.set(1, 1, 1);
                wave.mesh.material.uniforms.progress.value = 0;
                wave.mesh.visible = true;
            }

            update(delta) {
                for (let wave of this.waves) {
                    if (!wave.active) continue;

                    wave.age += delta;
                    if (wave.age >= wave.maxLife) {
                        wave.active = false;
                        wave.mesh.visible = false;
                        continue;
                    }

                    const progress = wave.age / wave.maxLife;
                    const easeOut = 1.0 - Math.pow(1.0 - progress, 3.0);
                    const scale = easeOut * wave.targetScale;

                    wave.mesh.scale.set(scale, scale, scale * 0.5);
                    wave.mesh.material.uniforms.progress.value = progress;
                }
            }

            hideAll() {
                for (let wave of this.waves) {
                    if (wave.active) wave.mesh.visible = false;
                }
            }

            showActive() {
                for (let wave of this.waves) {
                    if (wave.active) wave.mesh.visible = true;
                }
            }
        }

        // ============================================================================
        // GŁÓWNY MENADŻER CZĄSTECZEK ARTYLERYJSKICH
        // Typy:
        //  1: PUNCH FLASH      - krótki ostry rozbłysk
        //  2: FIREBALL CHUNK   - kawałki ognistej kuli z FBM
        //  3: TRAILED DEBRIS   - rozżarzone odłamki z dragiem (smuga ciągniona)
        //  4: SHRAPNEL         - małe odłamki rozrzucone z grawitacją
        //  5: ANAMORPHIC FLASH - poziomy lens-flare (krótki)
        //  6: PERCUSSIVE RING  - ostry, szybki pierścień uderzeniowy
        //  7: HOT DEBRIS CHUNK - duży świecący fragment z rotacją
        // ============================================================================
        class GPUInstancedParticleManager {
            constructor(scene, maxParticles, blendingType) {
                this.maxParticles = maxParticles;
                this.activeIndex = 0;

                const baseGeo = new THREE.PlaneGeometry(1, 1);
                const geo = new THREE.InstancedBufferGeometry();
                geo.index = baseGeo.index;
                geo.setAttribute('position', baseGeo.attributes.position);
                geo.setAttribute('uv', baseGeo.attributes.uv);

                this.startPos = new Float32Array(maxParticles * 3);
                this.startVel = new Float32Array(maxParticles * 3);
                this.dataInfo = new Float32Array(maxParticles * 4);

                geo.setAttribute('aStartPos', new THREE.InstancedBufferAttribute(this.startPos, 3));
                geo.setAttribute('aStartVel', new THREE.InstancedBufferAttribute(this.startVel, 3));
                geo.setAttribute('aData', new THREE.InstancedBufferAttribute(this.dataInfo, 4));
                geo.instanceCount = maxParticles;

                this.material = new THREE.ShaderMaterial({
                    uniforms: {
                        uTime: { value: 0 },
                        u_hdrIntensity: { value: window.FlameSettings.hdrIntensity },
                        u_stretchMult: { value: window.FlameSettings.stretchMult },
                        u_explosionSize: { value: window.FlameSettings.explosionSize }
                    },
                    vertexShader: `
                        attribute vec3 aStartPos;
                        attribute vec3 aStartVel;
                        attribute vec4 aData;

                        uniform float uTime;
                        uniform float u_hdrIntensity;
                        uniform float u_stretchMult;
                        uniform float u_explosionSize;

                        varying vec3 vColor;
                        varying float vAlpha;
                        varying vec2 vUv;
                        varying float vType;
                        varying float vAgeNorm;
                        varying float vSeed;

                        float hash(float n) { return fract(sin(n) * 43758.5453123); }

                        void main() {
                            vUv = uv;
                            vType = aData.w;
                            float startTime = aData.x;
                            float maxLife = aData.y;
                            float age = uTime - startTime;
                            vSeed = hash(aData.x);

                            if (age < 0.0 || age > maxLife) {
                                gl_Position = vec4(9999.0, 9999.0, 9999.0, 1.0);
                                return;
                            }

                            float ratio = 1.0 - (age / maxLife);
                            vAgeNorm = age / maxLife;

                            vec3 pos = aStartPos + aStartVel * age;
                            float currentSize = aData.z;
                            vec4 mvPosition;

                            if (vType < 1.5) { // PUNCH FLASH (Typ 1)
                                // Eksplozyjny wzrost na początku, szybki zanik
                                float burst = pow(1.0 - ratio, 0.25);
                                currentSize = aData.z * (0.3 + burst * 0.7);
                                vec3 hot = vec3(1.0, 1.0, 1.0);
                                vec3 cool = vec3(0.4, 0.7, 1.0);
                                vColor = mix(hot, cool, vAgeNorm) * u_hdrIntensity * 2.5;
                                vAlpha = pow(ratio, 3.0);

                                mvPosition = modelViewMatrix * vec4(pos, 1.0);
                                mvPosition.xy += position.xy * currentSize;
                            }
                            else if (vType < 2.5) { // FIREBALL CHUNK (Typ 2) - kłąb ognia
                                // Szybki wzrost i zanik
                                float growth = pow(vAgeNorm, 0.4);
                                currentSize = aData.z * (0.4 + growth * 1.4);
                                vec3 hotCore = vec3(1.0, 0.95, 0.9);
                                vec3 midFire = vec3(0.6, 0.8, 1.0);
                                vec3 darkEdge = vec3(0.05, 0.15, 0.4);
                                if (vAgeNorm < 0.25) {
                                    vColor = mix(hotCore, midFire, vAgeNorm / 0.25);
                                } else {
                                    vColor = mix(midFire, darkEdge, (vAgeNorm - 0.25) / 0.75);
                                }
                                vColor *= u_hdrIntensity * 1.2;
                                vAlpha = pow(ratio, 1.4);

                                mvPosition = modelViewMatrix * vec4(pos, 1.0);
                                mvPosition.xy += position.xy * currentSize;
                            }
                            else if (vType < 3.5) { // TRAILED DEBRIS (Typ 3) - rozżarzona smuga z dragiem
                                float drag = 1.5 + vSeed * 1.5;
                                pos = aStartPos + aStartVel * ((1.0 - exp(-age * drag)) / drag);
                                vec3 currentVel = aStartVel * exp(-age * drag);
                                float speed = length(currentVel);

                                // Zimne metalowe odłamki - od białego do ciemnego niebieskiego
                                vec3 hot = vec3(1.0, 0.98, 0.95) * 4.0;
                                vec3 cold = vec3(0.15, 0.45, 1.0) * 1.5;
                                vColor = mix(hot, cold, pow(vAgeNorm, 0.6)) * u_hdrIntensity;
                                vAlpha = pow(ratio, 0.7);

                                mvPosition = modelViewMatrix * vec4(pos, 1.0);

                                vec3 viewVel = (modelViewMatrix * vec4(currentVel, 0.0)).xyz;
                                vec2 dir = normalize(viewVel.xy);
                                if (length(viewVel.xy) < 0.1) dir = vec2(0.0, 1.0);

                                float width = aData.z * 0.4;
                                float stretch = aData.z * speed * 0.0025 * u_stretchMult;

                                float tailFactor = 0.5 - position.y;

                                vec2 scaledOffset;
                                scaledOffset.x = position.x * width;
                                scaledOffset.y = -tailFactor * stretch;

                                vec2 rotatedOffset;
                                rotatedOffset.x = scaledOffset.x * dir.y + scaledOffset.y * dir.x;
                                rotatedOffset.y = -scaledOffset.x * dir.x + scaledOffset.y * dir.y;

                                mvPosition.xy += rotatedOffset;
                            }
                            else if (vType < 4.5) { // SHRAPNEL (Typ 4) - małe odłamki balistyczne
                                // Lekki drag + grawitacyjny "opad" dla balistyki
                                float drag = 0.6 + vSeed * 0.6;
                                pos = aStartPos + aStartVel * ((1.0 - exp(-age * drag)) / drag);
                                pos.z -= 800.0 * age * age * (0.5 + vSeed); // ciężar fragmentu

                                vec3 hot = vec3(1.0, 0.85, 0.7);
                                vec3 cold = vec3(0.1, 0.3, 0.7);
                                vColor = mix(hot, cold, pow(vAgeNorm, 0.5)) * u_hdrIntensity * 1.3;
                                vAlpha = pow(ratio, 0.4);

                                // Stałe małe punkciki, lekko rozciągnięte ruchem
                                currentSize = aData.z * (1.0 - vAgeNorm * 0.3);

                                mvPosition = modelViewMatrix * vec4(pos, 1.0);
                                mvPosition.xy += position.xy * currentSize;
                            }
                            else if (vType < 5.5) { // ANAMORPHIC FLASH (Typ 5)
                                currentSize = aData.z * (0.5 + vAgeNorm * 0.5);
                                vColor = vec3(0.6, 0.85, 1.0) * 14.0;
                                vAlpha = pow(ratio, 4.0);

                                mvPosition = modelViewMatrix * vec4(pos, 1.0);
                                mvPosition.xy += position.xy * currentSize;
                            }
                            else if (vType < 6.5) { // PERCUSSIVE RING (Typ 6) - ostry pierścień
                                // Szybki wzrost na początku i nagły zanik
                                float waveCurve = pow(vAgeNorm, 0.3);
                                currentSize = aData.z * waveCurve;
                                vColor = vec3(0.4, 0.75, 1.0) * 6.0 * u_hdrIntensity;
                                vAlpha = pow(1.0 - vAgeNorm, 2.0);

                                vec3 flatPos = pos;
                                flatPos.x += position.x * currentSize;
                                flatPos.y += position.y * currentSize;
                                mvPosition = modelViewMatrix * vec4(flatPos, 1.0);
                            }
                            else { // HOT DEBRIS CHUNK (Typ 7) - duży obracający się fragment
                                float drag = 1.0 + vSeed * 1.0;
                                pos = aStartPos + aStartVel * ((1.0 - exp(-age * drag)) / drag);
                                pos.z -= 400.0 * age * age * (0.3 + vSeed);

                                // Bardzo gorący rdzeń stygnący do ciemnego błękitu
                                vec3 hot = vec3(1.0, 0.9, 0.7);
                                vec3 mid = vec3(0.3, 0.6, 1.0);
                                vec3 cold = vec3(0.05, 0.15, 0.4);
                                if (vAgeNorm < 0.3) {
                                    vColor = mix(hot, mid, vAgeNorm / 0.3);
                                } else {
                                    vColor = mix(mid, cold, (vAgeNorm - 0.3) / 0.7);
                                }
                                vColor *= u_hdrIntensity * 1.4;
                                vAlpha = pow(ratio, 0.7);

                                currentSize = aData.z * (1.0 - vAgeNorm * 0.5);

                                // Rotacja wokół własnej osi (na płaszczyźnie ekranu)
                                float spinSpeed = (vSeed - 0.5) * 12.0;
                                float spin = age * spinSpeed;
                                float c = cos(spin), s = sin(spin);
                                vec2 rotPos = vec2(position.x * c - position.y * s,
                                                   position.x * s + position.y * c);

                                mvPosition = modelViewMatrix * vec4(pos, 1.0);
                                mvPosition.xy += rotPos * currentSize;
                            }

                            gl_Position = projectionMatrix * mvPosition;
                        }
                    `,
                    fragmentShader: `
                        varying vec3 vColor;
                        varying float vAlpha;
                        varying vec2 vUv;
                        varying float vType;
                        varying float vAgeNorm;
                        varying float vSeed;
                        uniform float uTime;

                        ${noiseChunk}

                        void main() {
                            vec2 uv = vUv - vec2(0.5);
                            float dist = length(uv) * 2.0;

                            if (vType < 1.5) { // PUNCH FLASH - twarda kula plus poziomy spike
                                float core = max(0.0, 1.0 - smoothstep(0.0, 0.4, dist));
                                float spike = max(0.0, 1.0 - smoothstep(0.0, 0.05, abs(uv.y))) * (1.0 - abs(uv.x) * 1.6);
                                float spike2 = max(0.0, 1.0 - smoothstep(0.0, 0.05, abs(uv.x))) * (1.0 - abs(uv.y) * 1.6);
                                float total = core * 1.5 + spike + spike2 * 0.6;
                                gl_FragColor = vec4(vColor, total * vAlpha);
                            }
                            else if (vType < 2.5) { // FIREBALL CHUNK - poszarpany ognisty kłąb
                                if(dist > 1.0) discard;
                                vec3 noisePos = vec3(uv * 3.0, vSeed * 50.0 + uTime * 0.5);
                                float n = fbm(noisePos);
                                float radial = max(0.0, 1.0 - dist);
                                float lump = smoothstep(0.0, 0.6, n + radial * 0.7 - 0.4);
                                gl_FragColor = vec4(vColor, lump * vAlpha);
                            }
                            else if (vType < 3.5) { // TRAILED DEBRIS - smuga z białym czołem
                                vec2 pt = vUv - vec2(0.5);
                                float glowX = pow(max(0.0, 0.5 - abs(pt.x)) * 2.0, 2.5);
                                float fadeY = smoothstep(1.0, 0.85, vUv.y) * smoothstep(0.0, 0.15, vUv.y);
                                float headPunch = smoothstep(0.6, 0.95, vUv.y) * 1.5;
                                float baseAlpha = glowX * (fadeY + headPunch);
                                gl_FragColor = vec4(vColor, baseAlpha * vAlpha);
                            }
                            else if (vType < 4.5) { // SHRAPNEL - mały twardy punkt
                                if(dist > 1.0) discard;
                                float core = max(0.0, 1.0 - smoothstep(0.0, 0.6, dist));
                                float halo = max(0.0, 1.0 - smoothstep(0.0, 1.0, dist)) * 0.3;
                                gl_FragColor = vec4(vColor, (core + halo) * vAlpha);
                            }
                            else if (vType < 5.5) { // ANAMORPHIC FLASH
                                float core = max(0.0, 1.0 - smoothstep(0.0, 0.25, dist));
                                float flareY = max(0.0, 1.0 - smoothstep(0.0, 0.015, abs(uv.y)));
                                float flareX = max(0.0, 1.0 - smoothstep(0.0, 0.55, abs(uv.x)));
                                float flare = flareY * flareX * 2.5;
                                float aura = max(0.0, 1.0 - dist) * 0.5;
                                float finalIntensity = max(0.0, core + flare + aura);
                                gl_FragColor = vec4(vColor * finalIntensity, finalIntensity * vAlpha);
                            }
                            else if (vType < 6.5) { // PERCUSSIVE RING - cienki, ostry pierścień
                                if(dist > 1.0) discard;
                                float ringEdge = max(0.0, 1.0 - smoothstep(0.0, 0.06, abs(dist - 0.85)));
                                float angle = atan(uv.y, uv.x);
                                float n = 0.7 + 0.3 * fbm(vec3(angle * 8.0, dist * 3.0, uTime * 0.3));
                                float finalRing = ringEdge * n;
                                gl_FragColor = vec4(vColor, finalRing * vAlpha);
                            }
                            else { // HOT DEBRIS CHUNK - nieregularny kawałek
                                vec3 noisePos = vec3(uv * 4.0, vSeed * 30.0);
                                float n = fbm(noisePos);
                                float radial = max(0.0, 1.0 - dist * 1.2);
                                float chunk = smoothstep(0.45, 0.65, n * 0.6 + radial);
                                if (chunk < 0.05) discard;
                                // Gorący rdzeń przy środku, ciemniejszy outline
                                float coreHot = max(0.0, 1.0 - smoothstep(0.0, 0.4, dist)) * 1.5;
                                vec3 finalColor = vColor + vec3(0.5, 0.4, 0.2) * coreHot;
                                gl_FragColor = vec4(finalColor, chunk * vAlpha);
                            }
                        }
                    `,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                    depthTest: false,
                    transparent: true
                });

                this.mesh = new THREE.Mesh(geo, this.material);
                this.mesh.frustumCulled = false;
                this.mesh.renderOrder = 1000;
                scene.add(this.mesh);
            }

            spawn(x, y, z, vx, vy, vz, size, life, type) {
                let i = this.activeIndex;
                this.activeIndex = (this.activeIndex + 1) % this.maxParticles;
                let i3 = i * 3, i4 = i * 4;

                this.startPos[i3]=x; this.startPos[i3+1]=y; this.startPos[i3+2]=z;
                this.startVel[i3]=vx; this.startVel[i3+1]=vy; this.startVel[i3+2]=vz;

                this.dataInfo[i4] = globalTime;
                this.dataInfo[i4+1] = life;
                this.dataInfo[i4+2] = size;
                this.dataInfo[i4+3] = type;

                const geo = this.mesh.geometry;
                geo.attributes.aStartPos.needsUpdate = true;
                geo.attributes.aStartVel.needsUpdate = true;
                geo.attributes.aData.needsUpdate = true;
            }

            update() {
                this.material.uniforms.uTime.value = globalTime;
            }
        }

        // Smoke - kłębiasty dym artyleryjski (mroczny, nieprzezroczysty)
        class GPUParticleManager {
            constructor(scene, maxParticles, blendingType) {
                this.maxParticles = maxParticles;
                this.activeIndex = 0;

                const baseGeo = new THREE.PlaneGeometry(1, 1);
                const geo = new THREE.InstancedBufferGeometry();
                geo.index = baseGeo.index;
                geo.setAttribute('position', baseGeo.attributes.position);
                geo.setAttribute('uv', baseGeo.attributes.uv);

                this.startPos = new Float32Array(maxParticles * 3);
                this.startVel = new Float32Array(maxParticles * 3);
                this.dataInfo = new Float32Array(maxParticles * 4);

                geo.setAttribute('aStartPos', new THREE.InstancedBufferAttribute(this.startPos, 3));
                geo.setAttribute('aStartVel', new THREE.InstancedBufferAttribute(this.startVel, 3));
                geo.setAttribute('aData', new THREE.InstancedBufferAttribute(this.dataInfo, 4));
                geo.instanceCount = maxParticles;

                this.material = new THREE.ShaderMaterial({
                    uniforms: { uTime: { value: 0 } },
                    vertexShader: `
                        attribute vec3 aStartPos;
                        attribute vec3 aStartVel;
                        attribute vec4 aData;
                        uniform float uTime;

                        varying vec3 vColor;
                        varying float vAlpha;
                        varying vec2 vUv;
                        varying float vAgeNorm;
                        varying float vType;
                        varying float vSeed;

                        float hash(float n) { return fract(sin(n) * 43758.5453123); }

                        void main() {
                            vUv = uv;
                            vType = aData.w;
                            vSeed = hash(aData.x);
                            float startTime = aData.x;
                            float maxLife = aData.y;
                            float age = uTime - startTime;

                            if (age < 0.0 || age > maxLife) {
                                gl_Position = vec4(9999.0, 9999.0, 9999.0, 1.0);
                                return;
                            }

                            vAgeNorm = age / maxLife;
                            float waveCurve = pow(vAgeNorm, 0.5);
                            float currentSize = aData.z * (0.3 + waveCurve * 0.9);

                            // Mroczny granat dla artyleryjskiego dymu
                            vColor = vec3(0.03, 0.06, 0.13);
                            vAlpha = pow(1.0 - vAgeNorm, 1.8) * 0.9;

                            vec3 pos = aStartPos + aStartVel * age;
                            // Lekkie unoszenie dymu w czasie
                            pos.z += age * 50.0 * vSeed;

                            vec3 flatPos = pos;
                            flatPos.x += position.x * currentSize;
                            flatPos.y += position.y * currentSize;
                            vec4 mvPosition = modelViewMatrix * vec4(flatPos, 1.0);

                            gl_Position = projectionMatrix * mvPosition;
                        }
                    `,
                    fragmentShader: `
                        varying vec3 vColor;
                        varying float vAlpha;
                        varying vec2 vUv;
                        varying float vAgeNorm;
                        varying float vType;
                        varying float vSeed;
                        uniform float uTime;

                        ${noiseChunk}

                        void main() {
                            vec2 uv = vUv - vec2(0.5);
                            float dist = length(uv) * 2.0;
                            if(dist > 1.0) discard;

                            // Kłębiasty dym z fbm
                            float cloud = max(0.0, 1.0 - smoothstep(0.2, 1.0, dist));
                            vec3 noisePos = vec3(uv * 4.0 + vSeed * 30.0, uTime * 0.15);
                            float n = fbm(noisePos);
                            float lump = smoothstep(0.0, 0.7, n * 0.7 + cloud);
                            float finalAlpha = lump * vAlpha;
                            gl_FragColor = vec4(vColor, finalAlpha);
                        }
                    `,
                    blending: blendingType,
                    depthWrite: false,
                    depthTest: false,
                    transparent: true
                });

                this.mesh = new THREE.Mesh(geo, this.material);
                this.mesh.frustumCulled = false;
                this.mesh.renderOrder = 999;
                scene.add(this.mesh);
            }

            spawn(x, y, z, vx, vy, vz, size, life, type) {
                let i = this.activeIndex;
                this.activeIndex = (this.activeIndex + 1) % this.maxParticles;
                let i3 = i * 3, i4 = i * 4;

                this.startPos[i3]=x; this.startPos[i3+1]=y; this.startPos[i3+2]=z;
                this.startVel[i3]=vx; this.startVel[i3+1]=vy; this.startVel[i3+2]=vz;

                this.dataInfo[i4] = globalTime;
                this.dataInfo[i4+1] = life;
                this.dataInfo[i4+2] = size;
                this.dataInfo[i4+3] = type;

                const geo = this.mesh.geometry;
                geo.attributes.aStartPos.needsUpdate = true;
                geo.attributes.aStartVel.needsUpdate = true;
                geo.attributes.aData.needsUpdate = true;
            }

            update() {
                this.material.uniforms.uTime.value = globalTime;
            }
        }

        // --- TRAFIENIE ARTYLERYJSKIE YAMATO ---
        function triggerYamatoImpact(x, y, z) {
            const explodeZ = Math.max(z, 160);
            const eSize = window.FlameSettings.explosionSize;

            // Krótki, ostry shake (artyleryjski punch)
            screenShake = 600 * eSize;

            const expX = x;
            const expY = y;

            // 0. MAŁA OPTYCZNA FALA - krótki impuls (wcześniej była ogromna bańka)
            distortionManager.spawn(expX, expY, explodeZ, 4500 * eSize, 0.4);

            // 1. PUNCH FLASH - wielki krzyż początkowy
            fireParticleSystem.spawn(expX, expY, explodeZ + 200, 0,0,0, 8000 * eSize, 0.18, 1);

            // 2. ANAMORPHIC FLASH - poziomy lens-flare
            fireParticleSystem.spawn(expX, expY, explodeZ + 150, 0,0,0, 11000 * eSize, 0.5, 5);

            // 3. PERCUSSIVE RING - ostry pierścień (BARDZO mały i krótki)
            fireParticleSystem.spawn(expX, expY, explodeZ + 50, 0,0,0, 7000 * eSize, 0.35, 6);

            // 4. KULA OGNIA - kilkanaście chunkow tworzących kłąb płomieni
            for (let i = 0; i < 28; i++) {
                const angle = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const speed = (200 + Math.random() * 800) * eSize;
                const vx = Math.sin(phi) * Math.cos(angle) * speed;
                const vy = Math.sin(phi) * Math.sin(angle) * speed;
                const vz = Math.cos(phi) * speed * 0.4;
                const sz = (1200 + Math.random() * 1600) * eSize;
                const lf = 0.8 + Math.random() * 0.6;
                fireParticleSystem.spawn(expX, expY, explodeZ + 100, vx, vy, vz, sz, lf, 2);
            }

            // 5. ROZŻARZONE ODŁAMKI Z SMUGAMI - ~80 dłuższych smug ciągniętych
            for (let i = 0; i < 80; i++) {
                const speed = (4000 + Math.random() * 12000) * eSize;
                const angle = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const vx = Math.sin(phi) * Math.cos(angle) * speed;
                const vy = Math.sin(phi) * Math.sin(angle) * speed;
                const vz = Math.cos(phi) * speed * 0.3;
                const sz = (60 + Math.random() * 80) * eSize;
                const lf = 0.6 + Math.random() * 0.5;
                fireParticleSystem.spawn(expX, expY, explodeZ + 100, vx, vy, vz, sz, lf, 3);
            }

            // 6. DUŻE GORĄCE FRAGMENTY OBROTOWE - ~16 sztuk (wyróżniają się rotacją)
            for (let i = 0; i < 16; i++) {
                const angle = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const speed = (1500 + Math.random() * 4000) * eSize;
                const vx = Math.sin(phi) * Math.cos(angle) * speed;
                const vy = Math.sin(phi) * Math.sin(angle) * speed;
                const vz = Math.cos(phi) * speed * 0.5;
                const sz = (200 + Math.random() * 350) * eSize;
                const lf = 1.2 + Math.random() * 0.8;
                fireParticleSystem.spawn(expX, expY, explodeZ + 100, vx, vy, vz, sz, lf, 7);
            }

            // 7. SHRAPNEL - dużo małych odłamków balistycznych z grawitacją
            for (let i = 0; i < 600; i++) {
                const angle = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const speed = (2500 + Math.random() * 9000) * eSize;
                const vx = Math.sin(phi) * Math.cos(angle) * speed;
                const vy = Math.sin(phi) * Math.sin(angle) * speed;
                const vz = Math.cos(phi) * speed * 0.6 + 1500 * Math.random();
                const sz = (15 + Math.random() * 25) * eSize;
                const lf = 1.0 + Math.random() * 1.5;
                fireParticleSystem.spawn(expX, expY, explodeZ + 100, vx, vy, vz, sz, lf, 4);
            }

            // 8. KŁĘBY DYMU - rozproszone wokół centrum
            for (let i = 0; i < 25; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 1500 * eSize;
                const sx = expX + Math.cos(angle) * dist;
                const sy = expY + Math.sin(angle) * dist;
                const speed = (300 + Math.random() * 800) * eSize;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                const sz = (3000 + Math.random() * 3000) * eSize;
                const lf = 1.5 + Math.random() * 1.2;
                smokeParticleSystem.spawn(sx, sy, explodeZ, vx, vy, 100 * Math.random(), sz, lf, 2);
            }

            // 9. ŁAŃCUCH WTÓRNYCH WYBUCHÓW - 4 mniejsze pop-y w pobliżu w odstępach
            for (let s = 0; s < 4; s++) {
                const delay = 80 + s * 110 + Math.random() * 60;
                setTimeout(() => {
                    const popAngle = Math.random() * Math.PI * 2;
                    const popDist = (800 + Math.random() * 2200) * eSize;
                    const px = expX + Math.cos(popAngle) * popDist;
                    const py = expY + Math.sin(popAngle) * popDist;
                    const popScale = 0.35 + Math.random() * 0.35;

                    // Mini punch
                    fireParticleSystem.spawn(px, py, explodeZ + 150, 0,0,0,
                        4000 * eSize * popScale, 0.14, 1);
                    // Mini ring
                    fireParticleSystem.spawn(px, py, explodeZ + 50, 0,0,0,
                        2800 * eSize * popScale, 0.25, 6);
                    // Mini fireball chunks
                    for (let k = 0; k < 8; k++) {
                        const ang = Math.random() * Math.PI * 2;
                        const sp = (400 + Math.random() * 700) * eSize;
                        fireParticleSystem.spawn(px, py, explodeZ + 80,
                            Math.cos(ang)*sp, Math.sin(ang)*sp, (Math.random()-0.3)*sp*0.4,
                            (500 + Math.random() * 700) * eSize * popScale,
                            0.5 + Math.random() * 0.4, 2);
                    }
                    // Mini shrapnel
                    for (let k = 0; k < 80; k++) {
                        const ang = Math.random() * Math.PI * 2;
                        const phi = Math.acos(2 * Math.random() - 1);
                        const sp = (1200 + Math.random() * 4000) * eSize;
                        fireParticleSystem.spawn(px, py, explodeZ + 80,
                            Math.sin(phi)*Math.cos(ang)*sp,
                            Math.sin(phi)*Math.sin(ang)*sp,
                            Math.cos(phi)*sp*0.5,
                            (10 + Math.random() * 18) * eSize,
                            0.8 + Math.random() * 1.0, 4);
                    }
                    // Mini dymek
                    smokeParticleSystem.spawn(px, py, explodeZ, 0,0,0,
                        (1400 + Math.random() * 1200) * eSize * popScale,
                        1.0 + Math.random() * 0.8, 2);

                    // Lekki dodatkowy shake
                    screenShake = Math.max(screenShake, 250 * eSize * popScale);
                }, delay);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            rtTexture.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseDown(event) {
            if(event.target.closest('#ui') || event.target.closest('#tuning-ui')) return;

            if (event.button === 0) {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(groundPlaneMesh);

                if (intersects.length > 0) {
                    triggerYamatoImpact(intersects[0].point.x, intersects[0].point.y, 160);
                }
            }
        }

        const originalCameraPos = new THREE.Vector3();

        function animate() {
            setTimeout(animate, 0);

            const now = performance.now();
            const delta = Math.min((now - lastTime) / 1000, 0.05);
            lastTime = now;
            globalTime += delta;

            if (targetDistance > 0) {
                const currentDistance = camera.position.distanceTo(controls.target);
                const newDistance = THREE.MathUtils.lerp(currentDistance, targetDistance, delta * 12);
                const direction = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
                originalCameraPos.copy(controls.target).add(direction.multiplyScalar(newDistance));
            } else {
                originalCameraPos.copy(camera.position);
            }

            if (screenShake > 0) {
                camera.position.x = originalCameraPos.x + (Math.random() - 0.5) * screenShake;
                camera.position.y = originalCameraPos.y + (Math.random() - 0.5) * screenShake;
                camera.position.z = originalCameraPos.z + (Math.random() - 0.5) * screenShake;
                screenShake *= 0.90;
                if (screenShake < 1) screenShake = 0;
            } else {
                camera.position.copy(originalCameraPos);
            }

            controls.update();

            fireParticleSystem.update();
            smokeParticleSystem.update();
            distortionManager.update(delta);

            const hasDistortion = distortionManager.waves.some(w => w.active);

            if (hasDistortion) {
                distortionManager.hideAll();

                renderer.setRenderTarget(rtTexture);
                renderer.clear();
                renderer.render(scene, camera);

                distortionManager.showActive();
            }

            renderer.setRenderTarget(null);
            composer.render();
        }

        init();
        lastTime = performance.now();
        animate();
    </script>
