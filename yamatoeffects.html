<script type="module">
import * as THREE from 'three';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';

// ─── Scene ────────────────────────────────────────────────────────────────────
const scene    = new THREE.Scene();
scene.fog      = new THREE.FogExp2(0x060812, 0.0000015);
const camera   = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 1, 500000);
camera.position.set(0, 5000, 10000);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.mouseButtons = { LEFT:null, MIDDLE:THREE.MOUSE.ROTATE, RIGHT:THREE.MOUSE.PAN };
controls.enableZoom = false; controls.enableDamping = true;
controls.dampingFactor = 0.06; controls.panSpeed = 2;
controls.minDistance = 500; controls.maxDistance = 120000;

let targetDist = camera.position.distanceTo(controls.target);
window.addEventListener('wheel', e => {
    targetDist = THREE.MathUtils.clamp(targetDist + e.deltaY*30, controls.minDistance, controls.maxDistance);
}, { passive:true });

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.9, 0.8, 0.08));

// ground + bg
const groundMesh = new THREE.Mesh(new THREE.PlaneGeometry(2000000,2000000), new THREE.MeshBasicMaterial({visible:false}));
groundMesh.rotation.x = -Math.PI/2; scene.add(groundMesh);
const bgMesh = new THREE.Mesh(new THREE.PlaneGeometry(400000,400000), new THREE.MeshBasicMaterial({color:0x080d1c, depthWrite:false}));
bgMesh.rotation.x = -Math.PI/2; bgMesh.position.y = -20; scene.add(bgMesh);
scene.add(new THREE.GridHelper(40000, 60, 0x112244, 0x0a1830));

// ─── Shake ────────────────────────────────────────────────────────────────────
let shakeAmt = 0;
const origCam = new THREE.Vector3();

// ─── GLSL noise (1:1 z yamato.js) ────────────────────────────────────────────
const noiseChunk = `
    float hash(float n) { return fract(sin(n) * 43758.5453123); }
    float noise(vec3 x) {
        vec3 p = floor(x); vec3 f = fract(x);
        f = f*f*(3.0-2.0*f);
        float n = p.x + p.y*57.0 + 113.0*p.z;
        return mix(mix(mix(hash(n+0.),hash(n+1.),f.x),mix(hash(n+57.),hash(n+58.),f.x),f.y),
                   mix(mix(hash(n+113.),hash(n+114.),f.x),mix(hash(n+170.),hash(n+171.),f.x),f.y),f.z);
    }
    float fbm(vec3 p) {
        float f=0.; f+=0.5*noise(p); p*=2.02; f+=0.25*noise(p); p*=2.03; f+=0.125*noise(p); return f;
    }
`;

// ─── GPUInstancedParticleManager (identyczny z yamato.js) ────────────────────
class GPUInstancedParticleManager {
    constructor(scene, maxParticles, blendingType) {
        this.maxParticles = maxParticles;
        this.activeIndex  = 0;
        this.dirty        = false;

        const baseGeo = new THREE.PlaneGeometry(1,1);
        const geo     = new THREE.InstancedBufferGeometry();
        geo.index = baseGeo.index;
        geo.setAttribute('position', baseGeo.attributes.position);
        geo.setAttribute('uv',       baseGeo.attributes.uv);
        this.startPos = new Float32Array(maxParticles*3);
        this.startVel = new Float32Array(maxParticles*3);
        this.dataInfo = new Float32Array(maxParticles*4);
        geo.setAttribute('aStartPos', new THREE.InstancedBufferAttribute(this.startPos,3));
        geo.setAttribute('aStartVel', new THREE.InstancedBufferAttribute(this.startVel,3));
        geo.setAttribute('aData',     new THREE.InstancedBufferAttribute(this.dataInfo,4));
        geo.instanceCount = maxParticles;

        this.material = new THREE.ShaderMaterial({
            uniforms: { uTime:{value:0} },
            vertexShader: `
                attribute vec3 aStartPos; attribute vec3 aStartVel; attribute vec4 aData;
                uniform float uTime;
                varying vec3 vColor; varying float vAlpha; varying vec2 vUv;
                varying float vType; varying float vAgeNorm; varying float vSeed;
                float hash(float n){return fract(sin(n)*43758.5453123);}
                void main(){
                    vUv=uv; vType=aData.w; vSeed=hash(aData.x);
                    float age=uTime-aData.x;
                    if(age<0.||age>aData.y){gl_Position=vec4(9999,9999,9999,1);return;}
                    float ratio=1.-(age/aData.y); vAgeNorm=age/aData.y;
                    vec3 pos=aStartPos+aStartVel*age;
                    float sz=aData.z; vec4 mvp;

                    if(vType<1.5){ // PUNCH FLASH
                        sz=aData.z*(0.3+pow(1.-ratio,0.25)*0.7);
                        vColor=mix(vec3(1,1,1),vec3(0.4,0.7,1),vAgeNorm)*2.5;
                        vAlpha=pow(ratio,3.);
                        mvp=modelViewMatrix*vec4(pos,1); mvp.xy+=position.xy*sz;
                    } else if(vType<2.5){ // FIREBALL
                        sz=aData.z*(0.4+pow(vAgeNorm,0.4)*1.4);
                        vec3 hc=vec3(1,.95,.9),mf=vec3(.6,.8,1),de=vec3(.05,.15,.4);
                        vColor=(vAgeNorm<.25)?mix(hc,mf,vAgeNorm/.25):mix(mf,de,(vAgeNorm-.25)/.75); vColor*=1.5;
                        vAlpha=pow(ratio,1.4);
                        mvp=modelViewMatrix*vec4(pos,1); mvp.xy+=position.xy*sz;
                    } else if(vType<3.5){ // TRAILED DEBRIS
                        float drag=1.5+vSeed*1.5;
                        pos=aStartPos+aStartVel*((1.-exp(-age*drag))/drag);
                        vec3 cv=aStartVel*exp(-age*drag); float spd=length(cv);
                        vColor=mix(vec3(1,.98,.95)*4.,vec3(.15,.45,1)*1.5,pow(vAgeNorm,.6));
                        vAlpha=pow(ratio,.7);
                        mvp=modelViewMatrix*vec4(pos,1);
                        vec2 dir=normalize((modelViewMatrix*vec4(cv,0)).xy);
                        if(length((modelViewMatrix*vec4(cv,0)).xy)<.1) dir=vec2(0,1);
                        float w=aData.z*.4, str=aData.z*spd*.0025, tf=.5-position.y;
                        vec2 so; so.x=position.x*w; so.y=-tf*str;
                        mvp.xy+=vec2(so.x*dir.y+so.y*dir.x,-so.x*dir.x+so.y*dir.y);
                    } else if(vType<4.5){ // SHRAPNEL
                        float drag=.6+vSeed*.6;
                        pos=aStartPos+aStartVel*((1.-exp(-age*drag))/drag);
                        pos.y-=380.*age*age*(.4+vSeed);
                        vColor=mix(vec3(1,.85,.7),vec3(.1,.3,.7),pow(vAgeNorm,.5))*1.3;
                        vAlpha=pow(ratio,.4); sz=aData.z*(1.-vAgeNorm*.3);
                        mvp=modelViewMatrix*vec4(pos,1); mvp.xy+=position.xy*sz;
                    } else if(vType<5.5){ // ANAMORPHIC
                        sz=aData.z*(.5+vAgeNorm*.5);
                        vColor=vec3(.6,.85,1)*14.; vAlpha=pow(ratio,4.);
                        mvp=modelViewMatrix*vec4(pos,1); mvp.xy+=position.xy*sz;
                    } else if(vType<6.5){ // PERCUSSIVE RING
                        sz=aData.z*pow(vAgeNorm,.3);
                        vColor=vec3(.4,.75,1)*6.; vAlpha=pow(1.-vAgeNorm,2.);
                        vec3 fp=pos; fp.x+=position.x*sz; fp.z+=position.y*sz;
                        mvp=modelViewMatrix*vec4(fp,1);
                    } else { // HOT DEBRIS
                        float drag=1.+vSeed;
                        pos=aStartPos+aStartVel*((1.-exp(-age*drag))/drag);
                        pos.y-=240.*age*age*(.3+vSeed);
                        vec3 h=vec3(1,.9,.7),m=vec3(.3,.6,1),c=vec3(.05,.15,.4);
                        vColor=(vAgeNorm<.3)?mix(h,m,vAgeNorm/.3):mix(m,c,(vAgeNorm-.3)/.7); vColor*=1.4;
                        vAlpha=pow(ratio,.7); sz=aData.z*(1.-vAgeNorm*.5);
                        float sp=(vSeed-.5)*12., cn=cos(age*sp), sn=sin(age*sp);
                        vec2 rp=vec2(position.x*cn-position.y*sn, position.x*sn+position.y*cn);
                        mvp=modelViewMatrix*vec4(pos,1); mvp.xy+=rp*sz;
                    }
                    gl_Position=projectionMatrix*mvp;
                }
            `,
            fragmentShader: `
                varying vec3 vColor; varying float vAlpha; varying vec2 vUv;
                varying float vType; varying float vAgeNorm; varying float vSeed;
                uniform float uTime;
                ${noiseChunk}
                void main(){
                    vec2 uv=vUv-vec2(.5); float dist=length(uv)*2.;
                    if(vType<1.5){
                        float c=max(0.,1.-smoothstep(0.,.4,dist));
                        float sy=max(0.,1.-smoothstep(0.,.05,abs(uv.y)))*(1.-abs(uv.x)*1.6);
                        float sx=max(0.,1.-smoothstep(0.,.05,abs(uv.x)))*(1.-abs(uv.y)*1.6);
                        gl_FragColor=vec4(vColor,(c*1.5+sy+sx*.6)*vAlpha);
                    } else if(vType<2.5){
                        if(dist>1.) discard;
                        float n=fbm(vec3(uv*3.,vSeed*50.+uTime*.5));
                        float l=smoothstep(0.,.6,n+max(0.,1.-dist)*.7-.4);
                        gl_FragColor=vec4(vColor,l*vAlpha);
                    } else if(vType<3.5){
                        vec2 pt=vUv-vec2(.5);
                        float gx=pow(max(0.,.5-abs(pt.x))*2.,2.5);
                        float fy=smoothstep(1.,.85,vUv.y)*smoothstep(0.,.15,vUv.y);
                        float hd=smoothstep(.6,.95,vUv.y)*1.5;
                        gl_FragColor=vec4(vColor,gx*(fy+hd)*vAlpha);
                    } else if(vType<4.5){
                        if(dist>1.) discard;
                        float c=max(0.,1.-smoothstep(0.,.6,dist));
                        float h=max(0.,1.-smoothstep(0.,1.,dist))*.3;
                        gl_FragColor=vec4(vColor,(c+h)*vAlpha);
                    } else if(vType<5.5){
                        float c=max(0.,1.-smoothstep(0.,.25,dist));
                        float fy=max(0.,1.-smoothstep(0.,.015,abs(uv.y)));
                        float fx=max(0.,1.-smoothstep(0.,.55,abs(uv.x)));
                        float fi=max(0.,c+fy*fx*2.5+max(0.,1.-dist)*.5);
                        gl_FragColor=vec4(vColor*fi,fi*vAlpha);
                    } else if(vType<6.5){
                        if(dist>1.) discard;
                        float e=max(0.,1.-smoothstep(0.,.06,abs(dist-.85)));
                        float n=.7+.3*fbm(vec3(atan(uv.y,uv.x)*8.,dist*3.,uTime*.3));
                        gl_FragColor=vec4(vColor,e*n*vAlpha);
                    } else {
                        float n=fbm(vec3(uv*4.,vSeed*30.));
                        float ch=smoothstep(.45,.65,n*.6+max(0.,1.-dist*1.2));
                        if(ch<.05) discard;
                        gl_FragColor=vec4(vColor+vec3(.5,.4,.2)*max(0.,1.-smoothstep(0.,.4,dist))*1.5, ch*vAlpha);
                    }
                }
            `,
            blending:blendingType, depthWrite:false, depthTest:false, transparent:true
        });

        this.mesh = new THREE.Mesh(geo, this.material);
        this.mesh.frustumCulled = false; this.mesh.renderOrder = 1000;
        scene.add(this.mesh);
    }
    spawn(x,y,z,vx,vy,vz,size,life,type,gt){
        const i=this.activeIndex; this.activeIndex=(this.activeIndex+1)%this.maxParticles;
        const i3=i*3,i4=i*4;
        this.startPos[i3]=x; this.startPos[i3+1]=y; this.startPos[i3+2]=z;
        this.startVel[i3]=vx;this.startVel[i3+1]=vy;this.startVel[i3+2]=vz;
        this.dataInfo[i4]=gt; this.dataInfo[i4+1]=life; this.dataInfo[i4+2]=size; this.dataInfo[i4+3]=type;
        this.dirty=true;
    }
    update(gt){
        this.material.uniforms.uTime.value=gt;
        if(this.dirty){
            const g=this.mesh.geometry;
            g.attributes.aStartPos.needsUpdate=true;
            g.attributes.aStartVel.needsUpdate=true;
            g.attributes.aData.needsUpdate=true;
            this.dirty=false;
        }
    }
}

// ─── GPUParticleManager (dym — identyczny z yamato.js) ───────────────────────
class GPUParticleManager {
    constructor(scene,maxParticles,blendingType){
        this.maxParticles=maxParticles; this.activeIndex=0; this.dirty=false;
        const baseGeo=new THREE.PlaneGeometry(1,1);
        const geo=new THREE.InstancedBufferGeometry();
        geo.index=baseGeo.index;
        geo.setAttribute('position',baseGeo.attributes.position);
        geo.setAttribute('uv',baseGeo.attributes.uv);
        this.startPos=new Float32Array(maxParticles*3);
        this.startVel=new Float32Array(maxParticles*3);
        this.dataInfo=new Float32Array(maxParticles*4);
        geo.setAttribute('aStartPos',new THREE.InstancedBufferAttribute(this.startPos,3));
        geo.setAttribute('aStartVel',new THREE.InstancedBufferAttribute(this.startVel,3));
        geo.setAttribute('aData',    new THREE.InstancedBufferAttribute(this.dataInfo,4));
        geo.instanceCount=maxParticles;
        this.material=new THREE.ShaderMaterial({
            uniforms:{uTime:{value:0}},
            vertexShader:`
                attribute vec3 aStartPos;attribute vec3 aStartVel;attribute vec4 aData;
                uniform float uTime;
                varying vec3 vColor;varying float vAlpha;varying vec2 vUv;
                varying float vAgeNorm;varying float vSeed;
                float hash(float n){return fract(sin(n)*43758.5453123);}
                void main(){
                    vUv=uv; vSeed=hash(aData.x);
                    float age=uTime-aData.x;
                    if(age<0.||age>aData.y){gl_Position=vec4(9999,9999,9999,1);return;}
                    vAgeNorm=age/aData.y;
                    float sz=aData.z*(0.3+pow(vAgeNorm,.5)*.9);
                    vColor=vec3(.03,.06,.13); vAlpha=pow(1.-vAgeNorm,1.8)*.9;
                    vec3 pos=aStartPos+aStartVel*age;
                    pos.y+=age*40.*vSeed;
                    vec3 fp=pos; fp.x+=position.x*sz; fp.z+=position.y*sz;
                    gl_Position=projectionMatrix*modelViewMatrix*vec4(fp,1);
                }
            `,
            fragmentShader:`
                varying vec3 vColor;varying float vAlpha;varying vec2 vUv;
                varying float vAgeNorm;varying float vSeed;
                uniform float uTime;
                ${noiseChunk}
                void main(){
                    vec2 uv=vUv-vec2(.5); float dist=length(uv)*2.;
                    if(dist>1.) discard;
                    float cloud=max(0.,1.-smoothstep(.2,1.,dist));
                    float n=fbm(vec3(uv*4.+vSeed*30.,uTime*.15));
                    gl_FragColor=vec4(vColor,smoothstep(0.,.7,n*.7+cloud)*vAlpha);
                }
            `,
            blending:blendingType,depthWrite:false,depthTest:false,transparent:true
        });
        this.mesh=new THREE.Mesh(geo,this.material);
        this.mesh.frustumCulled=false; this.mesh.renderOrder=999;
        scene.add(this.mesh);
    }
    spawn(x,y,z,vx,vy,vz,size,life,type,gt){
        const i=this.activeIndex; this.activeIndex=(this.activeIndex+1)%this.maxParticles;
        const i3=i*3,i4=i*4;
        this.startPos[i3]=x;this.startPos[i3+1]=y;this.startPos[i3+2]=z;
        this.startVel[i3]=vx;this.startVel[i3+1]=vy;this.startVel[i3+2]=vz;
        this.dataInfo[i4]=gt;this.dataInfo[i4+1]=life;this.dataInfo[i4+2]=size;this.dataInfo[i4+3]=type;
        this.dirty=true;
    }
    update(gt){
        this.material.uniforms.uTime.value=gt;
        if(this.dirty){
            const g=this.mesh.geometry;
            g.attributes.aStartPos.needsUpdate=true;
            g.attributes.aStartVel.needsUpdate=true;
            g.attributes.aData.needsUpdate=true;
            this.dirty=false;
        }
    }
}

// ─── Shared systems ────────────────────────────────────────────────────────────
const fireSystem  = new GPUInstancedParticleManager(scene, 60000, THREE.AdditiveBlending);
const smokeSystem = new GPUParticleManager(scene, 12000, THREE.NormalBlending);
const activeEffects = [];

// ─── Spawn (logika identyczna z yamato.js) ─────────────────────────────────────
function spawnYamatoImpact(x, worldZ, size=110, q=1.0) {
    q = Math.max(0.55, Math.min(1.25, q));
    const eX=x, eY=5, eZ=worldZ;
    const gt0 = performance.now()/1000;

    shakeAmt = Math.max(shakeAmt, 600);

    // 3D light
    const light = new THREE.PointLight(0x66ccff, 8, size*14);
    light.position.set(eX, size*.5, eZ);
    scene.add(light);

    fireSystem.spawn(eX,eY,eZ, 0,0,0, size*72, 0.18, 1, gt0);
    fireSystem.spawn(eX,eY,eZ, 0,0,0, size*100, 0.5, 5, gt0);
    fireSystem.spawn(eX,eY,eZ, 0,0,0, size*63, 0.35, 6, gt0);

    for(let i=0;i<Math.round(28*q);i++){
        const a=Math.random()*Math.PI*2, phi=Math.acos(2*Math.random()-1), sp=(1.8+Math.random()*7.5)*size;
        fireSystem.spawn(eX,eY,eZ, Math.sin(phi)*Math.cos(a)*sp, Math.cos(phi)*sp*.4+Math.random()*size*.5, Math.sin(phi)*Math.sin(a)*sp, (10+Math.random()*14)*size, .8+Math.random()*.6, 2, gt0);
    }
    for(let i=0;i<Math.round(80*q);i++){
        const a=Math.random()*Math.PI*2, phi=Math.acos(2*Math.random()-1), sp=(35+Math.random()*110)*size;
        fireSystem.spawn(eX,eY,eZ, Math.sin(phi)*Math.cos(a)*sp, Math.cos(phi)*sp*.35+Math.random()*size*3, Math.sin(phi)*Math.sin(a)*sp, (.5+Math.random()*.75)*size, .6+Math.random()*.5, 3, gt0);
    }
    for(let i=0;i<Math.round(16*q);i++){
        const a=Math.random()*Math.PI*2, phi=Math.acos(2*Math.random()-1), sp=(13+Math.random()*36)*size;
        fireSystem.spawn(eX,eY,eZ, Math.sin(phi)*Math.cos(a)*sp, Math.cos(phi)*sp*.5+Math.random()*size*2, Math.sin(phi)*Math.sin(a)*sp, (1.8+Math.random()*3.2)*size, 1.2+Math.random()*.8, 7, gt0);
    }
    for(let i=0;i<Math.round(350*q);i++){
        const a=Math.random()*Math.PI*2, phi=Math.acos(2*Math.random()-1), sp=(22+Math.random()*82)*size;
        fireSystem.spawn(eX,eY,eZ, Math.sin(phi)*Math.cos(a)*sp, Math.cos(phi)*sp*.6+Math.random()*size*13, Math.sin(phi)*Math.sin(a)*sp, (.13+Math.random()*.22)*size, 1+Math.random()*1.5, 4, gt0);
    }
    for(let i=0;i<Math.round(25*q);i++){
        const a=Math.random()*Math.PI*2, d=Math.random()*1.5*size, sp=(2.5+Math.random()*7)*size;
        smokeSystem.spawn(eX+Math.cos(a)*d, eY, eZ+Math.sin(a)*d, Math.cos(a)*sp,0, Math.sin(a)*sp, (26+Math.random()*26)*size, 1.5+Math.random()*1.2, 1, gt0);
    }

    const secDelays = [0.08,0.19,0.30,0.43].map(d=>d+Math.random()*.06);
    let secIdx=0;
    const initTime = gt0;
    let disposed=false;

    function update(dt){
        if(disposed) return;
        const gt=performance.now()/1000;
        const time=gt-initTime;
        fireSystem.update(gt);
        smokeSystem.update(gt);
        light.intensity = Math.max(0, 8*(1-time/.4));

        while(secIdx<4 && time>=secDelays[secIdx]){
            const pA=Math.random()*Math.PI*2, pD=(7+Math.random()*20)*size, ps=.35+Math.random()*.35;
            const px=eX+Math.cos(pA)*pD, pz=eZ+Math.sin(pA)*pD;
            fireSystem.spawn(px,eY,pz, 0,0,0, size*36*ps, .13, 1, gt);
            fireSystem.spawn(px,eY,pz, 0,0,0, size*28*ps, .25, 6, gt);
            for(let k=0;k<8;k++){
                const a=Math.random()*Math.PI*2, sp=(3+Math.random()*7)*size;
                fireSystem.spawn(px,eY,pz, Math.cos(a)*sp, Math.random()*size*2, Math.sin(a)*sp, (5+Math.random()*7)*size*ps, .5+Math.random()*.4, 2, gt);
            }
            for(let k=0;k<45;k++){
                const a=Math.random()*Math.PI*2, phi=Math.acos(2*Math.random()-1), sp=(12+Math.random()*40)*size;
                fireSystem.spawn(px,eY,pz, Math.sin(phi)*Math.cos(a)*sp, Math.cos(phi)*sp*.5, Math.sin(phi)*Math.sin(a)*sp, (.1+Math.random()*.18)*size, .8+Math.random(), 4, gt);
            }
            smokeSystem.spawn(px,eY,pz, 0,0,0, (14+Math.random()*12)*size*ps, 1+Math.random()*.8, 1, gt);
            secIdx++;
        }

        if(time>=1.6){ dispose(); }
    }

    function dispose(){
        if(disposed) return; disposed=true;
        if(light.parent) light.parent.remove(light);
        const idx=activeEffects.indexOf(eff);
        if(idx!==-1) activeEffects.splice(idx,1);
    }

    const eff={update,dispose};
    return eff;
}

// ─── Input ────────────────────────────────────────────────────────────────────
const raycaster=new THREE.Raycaster(), mouse=new THREE.Vector2();
window.addEventListener('mousedown', e=>{
    if(e.button!==0) return;
    mouse.set((e.clientX/innerWidth)*2-1, -(e.clientY/innerHeight)*2+1);
    raycaster.setFromCamera(mouse, camera);
    const h=raycaster.intersectObject(groundMesh);
    if(!h.length) return;
    const eff=spawnYamatoImpact(h[0].point.x, h[0].point.z, 110);
    activeEffects.push(eff);
});
window.addEventListener('contextmenu', e=>e.preventDefault());
window.addEventListener('resize', ()=>{
    camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight);
});

// ─── Animate ──────────────────────────────────────────────────────────────────
const clock=new THREE.Clock();
function animate(){
    requestAnimationFrame(animate);
    const dt=Math.min(clock.getDelta(),.05);

    if(targetDist>0){
        const cur=camera.position.distanceTo(controls.target);
        const nd=THREE.MathUtils.lerp(cur,targetDist,dt*12);
        const dir=new THREE.Vector3().subVectors(camera.position,controls.target).normalize();
        origCam.copy(controls.target).addScaledVector(dir,nd);
    } else origCam.copy(camera.position);

    if(shakeAmt>0){
        camera.position.set(origCam.x+(Math.random()-.5)*shakeAmt,origCam.y+(Math.random()-.5)*shakeAmt,origCam.z+(Math.random()-.5)*shakeAmt);
        shakeAmt*=.88; if(shakeAmt<.5) shakeAmt=0;
    } else camera.position.copy(origCam);

    controls.update();
    for(let i=activeEffects.length-1;i>=0;i--) activeEffects[i].update(dt);
    composer.render();
}
animate();
</script>
