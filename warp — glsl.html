<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warp Tunnel - Cinematic FX</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; }
        canvas { display: block; }
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            border: 1px solid #0055ff;
            box-shadow: 0 0 15px rgba(0, 85, 255, 0.3);
            z-index: 10;
        }
        button {
            background: #002244;
            color: #00ddff;
            border: 1px solid #00ddff;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        button:hover { background: #0055ff; color: white; box-shadow: 0 0 10px #00ddff; }
        button:active { transform: scale(0.95); }
        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #00ddff;
            text-shadow: 0 0 5px #0055ff;
            z-index: 10;
        }
        #instructions {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
        }
        
        #progress-container {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 8px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #0055ff;
            border-radius: 4px;
            display: none; 
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 85, 255, 0.2);
            z-index: 20;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: #00ddff;
            box-shadow: 0 0 15px #00ddff;
            transition: width 0.1s linear; 
        }
    </style>
</head>
<body>

    <div id="status">STATUS: IDLE</div>
    <div id="instructions">[A/D] - Sterowanie statkiem (Drift) | [Scroll] - Zoom kamery (tylko do podglądu)</div>
    
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div id="ui-container">
        <button onclick="setStage('SPOOL')">1. Ładowanie (Spool)</button>
        <button onclick="setStage('JUMP')">2. Wystrzał -> Tunel</button>
        <button onclick="setStage('EXIT')">3. Wyjście (Exit)</button>
    </div>

    <!-- Import Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- 0. CONFIG + HELPERS ---
        const WARP_CONFIG = {
            spoolDuration:        4.0,
            jumpFlashDuration:    0.5,   // JUMP -> TUNNEL crossfade
            exitPunchDuration:    0.4,   // 0.0 - 0.4s "punch out"
            exitDecelDuration:    1.1,   // 0.4 - 1.5s decel
            exitSettleDuration:   1.5,   // 1.5 - 3.0s settle into destination
            exitTotalDuration:    3.0,
            baseFov:              60.0,
            spoolPeakFov:         72.0,
            exitPunchFov:         80.0,
            tunnelEventMinGap:    3.0,
            tunnelEventMaxGap:    7.0,
            cameraBaseY:          2500,
            cameraExitZoomY:      1800,
            cameraExitPullY:      3500
        };

        // Frame-rate-independent damping (cache-warm, accurate at any dt).
        // value approaches target with characteristic rate `rate` (higher = snappier).
        function damp(value, target, rate, dt) {
            return value + (target - value) * (1.0 - Math.exp(-rate * dt));
        }
        function smoothstep(edge0, edge1, x) {
            const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
            return t * t * (3 - 2 * t);
        }
        function lerp(a, b, t) { return a + (b - a) * t; }
        function easeOutQuart(t) { return 1.0 - Math.pow(1.0 - t, 4.0); }

        // --- 1. SETUP SCENY ---
        const scene = new THREE.Scene();
        let globalTime = 0;

        const camera = new THREE.PerspectiveCamera(WARP_CONFIG.baseFov, window.innerWidth / window.innerHeight, 1, 25000);
        let targetCameraY = WARP_CONFIG.cameraBaseY;
        let baseCameraX = 0;
        let baseCameraZ = 0;
        let targetFov = WARP_CONFIG.baseFov;
        let cameraRollTarget = 0.0;
        let currentCameraRoll = 0.0;
        camera.position.set(baseCameraX, targetCameraY, baseCameraZ);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.autoClear = false;
        document.body.appendChild(renderer.domElement);

        const shipContainer = new THREE.Group();
        shipContainer.position.y = 50;
        scene.add(shipContainer);

        // --- 1B. STARFIELD (always visible, distorts during warp) ---
        const STARFIELD_COUNT = 1500;
        const starGeo = new THREE.BufferGeometry();
        const starPositions = new Float32Array(STARFIELD_COUNT * 3);
        const starSizes = new Float32Array(STARFIELD_COUNT);
        const starSeeds = new Float32Array(STARFIELD_COUNT);
        for (let i = 0; i < STARFIELD_COUNT; i++) {
            // Distribute stars on a far plane below the camera (top-down view)
            starPositions[i * 3 + 0] = (Math.random() - 0.5) * 30000;
            starPositions[i * 3 + 1] = -8000 - Math.random() * 4000; // far below ship
            starPositions[i * 3 + 2] = (Math.random() - 0.5) * 30000;
            starSizes[i] = 6.0 + Math.pow(Math.random(), 3.0) * 50.0;
            starSeeds[i] = Math.random();
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        starGeo.setAttribute('aSize', new THREE.BufferAttribute(starSizes, 1));
        starGeo.setAttribute('aSeed', new THREE.BufferAttribute(starSeeds, 1));

        const uniformsStarfield = {
            uTime: { value: 0.0 },
            uExitProgress: { value: 0.0 },     // 0 = streaks, 1 = points (used during EXIT settle)
            uWarpStretch: { value: 0.0 },      // overall stretch from warp travel speed
            uVisibility: { value: 1.0 },       // 0 = hidden (deep tunnel), 1 = full
            uPixelRatio: { value: renderer ? renderer.getPixelRatio() : 1.0 }
        };

        const starMaterial = new THREE.ShaderMaterial({
            uniforms: uniformsStarfield,
            vertexShader: `
                uniform float uTime;
                uniform float uExitProgress;
                uniform float uWarpStretch;
                uniform float uPixelRatio;
                attribute float aSize;
                attribute float aSeed;
                varying float vAlpha;
                varying float vSeed;
                void main() {
                    vSeed = aSeed;
                    vec4 mv = modelViewMatrix * vec4(position, 1.0);
                    float twinkle = 0.7 + 0.3 * sin(uTime * 2.0 + aSeed * 12.566);
                    // Slight size pulse + warp stretch contributes to perceived size
                    float sz = aSize * twinkle * (1.0 + uWarpStretch * 0.4);
                    gl_PointSize = sz * uPixelRatio * (300.0 / -mv.z);
                    vAlpha = twinkle;
                    gl_Position = projectionMatrix * mv;
                }
            `,
            fragmentShader: `
                uniform float uExitProgress;
                uniform float uWarpStretch;
                uniform float uVisibility;
                varying float vAlpha;
                varying float vSeed;
                void main() {
                    vec2 pt = gl_PointCoord - vec2(0.5);
                    // During warp, stretch the star sprite vertically (tunnel axis = world Z, but
                    // viewed top-down so screen-Y is the travel direction).
                    float stretch = mix(1.0, 0.18, uExitProgress); // EXIT shrinks streaks toward dots
                    float warpBoost = mix(0.0, 1.0, uWarpStretch);
                    pt.y *= mix(1.0, 0.08, warpBoost) * (1.0 / stretch);
                    float d = length(pt);
                    float core = pow(max(0.0, 0.5 - d) * 2.0, 2.0);
                    vec3 col = mix(vec3(0.7, 0.85, 1.0), vec3(1.0, 0.95, 0.85), vSeed);
                    float a = core * vAlpha * uVisibility;
                    if (a < 0.01) discard;
                    gl_FragColor = vec4(col * a, a);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const starfield = new THREE.Points(starGeo, starMaterial);
        starfield.renderOrder = -1;
        starfield.frustumCulled = false;
        scene.add(starfield);

        const uniformsShip = {
            tDiffuse: { value: null },
            uSpoolProgress: { value: 0.0 },
            uTime: { value: 0.0 }
        };

        const textureLoader = new THREE.TextureLoader();
        textureLoader.load('https://raw.githubusercontent.com/bazylowybazyl/statki/refs/heads/main/assets/capital_ship_rect_v1.png', (texture) => {
            const srcW = texture.image.width;
            const srcH = texture.image.height;
            const targetLength = 2000;
            const targetWidth = targetLength * (srcH / srcW); 

            const shipGeometry = new THREE.PlaneGeometry(targetLength, targetWidth); 
            shipGeometry.rotateX(-Math.PI / 2); 
            shipGeometry.rotateY(Math.PI / 2);  

            uniformsShip.tDiffuse.value = texture;

            const shipMaterial = new THREE.ShaderMaterial({ 
                uniforms: uniformsShip,
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `
                    uniform sampler2D tDiffuse;
                    uniform float uSpoolProgress;
                    uniform float uTime;
                    varying vec2 vUv;

                    float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
                    float noise(vec2 p) {
                        vec2 i = floor(p); vec2 f = fract(p); f = f * f * (3.0 - 2.0 * f);
                        float a = hash(i); float b = hash(i + vec2(1.0, 0.0));
                        float c = hash(i + vec2(0.0, 1.0)); float d = hash(i + vec2(1.0, 1.0));
                        return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
                    }
                    float fbm(vec2 p) {
                        float v = 0.0; float a = 0.5;
                        for (int i = 0; i < 3; i++) { v += a * noise(p); p *= 2.0; a *= 0.5; }
                        return v;
                    }

                    float electricArc(vec2 uv, float time, float seed, float thickness) {
                        vec2 nUv = vec2(uv.y * 3.0, time * 6.0 + seed);
                        float n = fbm(nUv) - 0.5;
                        n += (fbm(nUv * 5.0) - 0.5) * 0.3;
                        float center = 0.5 + n * 0.8; 
                        float dist = abs(uv.x - center);
                        float yMask = smoothstep(0.05, 0.2, uv.y) * (1.0 - smoothstep(0.8, 0.95, uv.y));
                        float pulse = pow(sin(time * 30.0 + seed * 50.0) * 0.5 + 0.5, 4.0);
                        return (thickness / (dist + thickness)) * yMask * pulse;
                    }

                    void main() {
                        vec4 texColor = texture2D(tDiffuse, vUv);
                        
                        float wave = sin(vUv.x * 20.0 + uTime * 10.0) * 0.5 + 0.5;
                        float energyMask = smoothstep(0.0, 1.0, uSpoolProgress) * wave;
                        vec3 baseEnergy = vec3(0.1, 0.6, 1.0) * energyMask * 0.8;
                        
                        float arcs = 0.0;
                        arcs += electricArc(vUv, uTime, 1.1, 0.001);
                        arcs += electricArc(vUv, uTime, 5.5, 0.002);
                        arcs += electricArc(vec2(1.0 - vUv.x, vUv.y), uTime * 1.2, 12.3, 0.0008);
                        arcs *= smoothstep(0.2, 0.9, uSpoolProgress) * 2.5;
                        
                        vec3 arcColor = vec3(0.6, 0.9, 1.0) * arcs;
                        vec3 finalColor = texColor.rgb + (baseEnergy + arcColor) * texColor.a;
                        
                        gl_FragColor = vec4(finalColor, texColor.a);
                    }
                `,
                transparent: true, 
                depthWrite: false  
            });
            
            const shipMesh = new THREE.Mesh(shipGeometry, shipMaterial);
            shipMesh.renderOrder = 1; 
            
            shipContainer.add(shipMesh); 
        });

        // --- 2. SHADER TUNELU PLAZMOWEGO (FBM) ---
        const tunnelVertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const tunnelFragmentShader = `
            uniform float uTime;
            uniform float uTravelOffset; 
            uniform float uFlowSpeed;      
            uniform float uRibbonScale;    
            uniform float uEnergyThreshold;
            uniform float uIntensity;
            uniform float uTwist;
            uniform float uBowFocus;
            uniform float uAlphaMult; 
            uniform vec3 uColorBase;
            uniform vec3 uColorBright;
            uniform float uLightning;
            uniform float uExitProgress;   // 0..1 EXIT collapse-to-axis
            uniform float uEventFlash;     // 0..1 event brightness boost
            uniform vec3  uColorAccent;    // event color override
            uniform float uColorShift;     // 0..1 destination color gradient

            varying vec2 vUv;

            float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }

            float noise(vec2 p, float periodX) {
                vec2 i = floor(p); vec2 f = fract(p);
                f = f * f * (3.0 - 2.0 * f);
                float ix0 = mod(i.x, periodX); float ix1 = mod(i.x + 1.0, periodX);
                float a = hash(vec2(ix0, i.y)); float b = hash(vec2(ix1, i.y));
                float c = hash(vec2(ix0, i.y + 1.0)); float d = hash(vec2(ix1, i.y + 1.0));
                return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
            }

            float fbm(vec2 p, float periodX) {
                float v = 0.0; float a = 0.5;
                for (int i = 0; i < 4; i++) {
                    v += a * noise(p, periodX);
                    p *= 2.0; periodX *= 2.0; a *= 0.5;
                }
                return v;
            }

            float electricArcTunnel(vec2 uv, float time, float seed, float thickness, float periodX) {
                vec2 nUv = vec2(uv.y * 2.0 - time * 4.0, seed);
                float n = fbm(nUv, periodX) - 0.5;
                n += (fbm(vec2(uv.y * 12.0 + time * 8.0, seed + 1.2), periodX) - 0.5) * 0.25;
                
                float center = fract(time * 0.15 + seed + n * 0.4);
                float dist = abs(uv.x - center);
                dist = min(dist, 1.0 - dist); 
                
                float pulse = pow(abs(sin(time * 30.0 + seed * 100.0)), 6.0); 
                return (thickness / (dist + thickness)) * pulse;
            }

            void main() {
                vec2 uv = vUv;
                
                float spoolMask = smoothstep(0.30, 0.45, vUv.y) * (1.0 - smoothstep(0.55, 0.70, vUv.y));
                float bowY = 0.583; 
                float distToBow = abs(vUv.y - bowY);
                float bowTwistMask = 1.0 - smoothstep(0.0, 0.3, distToBow); 
                
                float baseTwist = mix(uTwist, uTwist * 0.1, uBowFocus);
                float localTwist = baseTwist + (bowTwistMask * uBowFocus * 0.8);

                uv.x += uv.y * localTwist;
                // POPRAWKA: Zmiana '+=' na '-='. Zapewnia spójny lot z góry na dół ekranu (od dziobu do silników).
                uv.y -= uTravelOffset + uTime * uFlowSpeed;

                float stripesX = max(1.0, floor(uRibbonScale)); 
                vec2 noiseUv = vec2(uv.x * stripesX, uv.y * 3.5);
                
                float n1 = fbm(noiseUv, stripesX);
                // POPRAWKA: Zmiana '+' na '-' w wektorze przesuwania szumu.
                float n2 = fbm(noiseUv * 2.0 - vec2(0.0, (uTravelOffset + uTime * uFlowSpeed) * 0.5), stripesX * 2.0); 
                
                float energy = n1 * n2;
                energy = smoothstep(uEnergyThreshold, 0.7, energy); 
                
                float edgeFade = smoothstep(0.0, 0.2, vUv.y) * (1.0 - smoothstep(0.8, 1.0, vUv.y));
                float currentMask = mix(edgeFade, spoolMask * 1.5, uBowFocus);

                // Distance-based color gradient: blue -> violet -> warm gold (destination).
                vec3 colBase = uColorBase;
                vec3 colBright = uColorBright;
                vec3 violet = vec3(0.45, 0.15, 0.85);
                vec3 gold = vec3(1.0, 0.75, 0.3);
                float seg1 = smoothstep(0.0, 0.5, uColorShift);
                float seg2 = smoothstep(0.5, 1.0, uColorShift);
                vec3 shiftedBase = mix(colBase, mix(colBase * 0.7 + violet * 0.4, gold * 0.3, seg2), seg1);
                vec3 shiftedBright = mix(colBright, mix(violet * 1.2, gold, seg2), seg1);
                // Event flash overrides bright color momentarily.
                shiftedBright = mix(shiftedBright, uColorAccent, uEventFlash);

                vec3 colorIridescent = mix(shiftedBright, vec3(0.8, 0.2, 1.0), sin(uTime * 3.0 + n1 * 10.0) * 0.5 + 0.5);
                vec3 finalColor = mix(shiftedBase, colorIridescent, energy * 2.0);
                finalColor *= 1.0 + uEventFlash * 0.6;
                
                float arcs = 0.0;
                arcs += electricArcTunnel(uv, uTime, 0.1, 0.0005, stripesX);
                arcs += electricArcTunnel(uv, uTime, 1.8, 0.0008, stripesX);
                arcs += electricArcTunnel(uv, uTime, 3.3, 0.0004, stripesX);
                arcs += electricArcTunnel(uv, uTime, 4.7, 0.0015, stripesX); 
                
                vec3 arcColor = vec3(0.8, 0.95, 1.0) * arcs * uLightning;
                finalColor += arcColor; 
                
                float alpha = (energy * uIntensity + (arcs * uLightning * 0.5)) * currentMask * uAlphaMult;
                // Tunnel collapses toward its central axis as exit progresses.
                // collapseR shrinks from 1.0 (full tunnel) toward 0.0 (axis line).
                float collapseR = max(0.0, 1.0 - smoothstep(0.0, 0.85, uExitProgress));
                float distFromAxis = abs(vUv.x - 0.5) * 2.0;
                float collapseFade = 1.0 - smoothstep(collapseR * 0.85, collapseR + 0.02, distFromAxis);
                alpha *= mix(1.0, collapseFade, step(0.001, uExitProgress));
                alpha = clamp(alpha, 0.0, 1.0);

                gl_FragColor = vec4(finalColor, alpha);
            }
        `;

        function createUniforms(alpha) {
            return {
                uTime: { value: 0.0 },
                uTravelOffset: { value: 0.0 },
                uFlowSpeed: { value: 0.0 },
                uRibbonScale: { value: 12.0 },
                uEnergyThreshold: { value: 0.15 },
                uIntensity: { value: 0.0 },
                uTwist: { value: 0.0 },
                uBowFocus: { value: 0.0 },
                uAlphaMult: { value: alpha },
                uLightning: { value: 0.0 },
                uColorBase: { value: new THREE.Color(0x001155) },
                uColorBright: { value: new THREE.Color(0x88ddff) },
                uExitProgress: { value: 0.0 },
                uEventFlash: { value: 0.0 },
                uColorAccent: { value: new THREE.Color(1.0, 0.8, 0.3) },
                uColorShift: { value: 0.0 }
            };
        }

        const uniformsBack = createUniforms(1.0); 
        const uniformsFront = createUniforms(0.4); 

        const tunnelGeo = new THREE.CylinderGeometry(800, 800, 12000, 64, 1, true);
        tunnelGeo.rotateX(Math.PI / 2);
        tunnelGeo.rotateZ(Math.PI / 2); 

        const tunnelBackMaterial = new THREE.ShaderMaterial({
            vertexShader: tunnelVertexShader,
            fragmentShader: tunnelFragmentShader,
            uniforms: uniformsBack,
            transparent: true,
            side: THREE.BackSide,
            blending: THREE.AdditiveBlending, 
            depthWrite: false 
        });
        const tunnelBack = new THREE.Mesh(tunnelGeo, tunnelBackMaterial);
        tunnelBack.renderOrder = 0; 
        scene.add(tunnelBack);

        const tunnelFrontMaterial = new THREE.ShaderMaterial({
            vertexShader: tunnelVertexShader,
            fragmentShader: tunnelFragmentShader,
            uniforms: uniformsFront,
            transparent: true,
            side: THREE.FrontSide,
            blending: THREE.AdditiveBlending, 
            depthWrite: false 
        });
        const tunnelFront = new THREE.Mesh(tunnelGeo, tunnelFrontMaterial);
        tunnelFront.renderOrder = 2; 
        scene.add(tunnelFront);


        // --- 3A. UNIWERSALNE ZAAWANSOWANE ISKRY (OPLOT + TUNEL + DETACH) ---
        const sparkBaseGeo = new THREE.PlaneGeometry(1, 1);
        sparkBaseGeo.translate(0, 0.5, 0); 

        const sparkCount = 4000; 
        const sparkGeoInst = new THREE.InstancedBufferGeometry().copy(sparkBaseGeo);
        sparkGeoInst.instanceCount = sparkCount;

        const spOffsets = new Float32Array(sparkCount * 3); 
        const spData = new Float32Array(sparkCount * 3);    
        const spColors = new Float32Array(sparkCount * 3);

        const cCyan = new THREE.Color(0x00e5ff);
        const cBlue = new THREE.Color(0x0055ff);
        const cWhite = new THREE.Color(0xffffff);

        for (let i = 0; i < sparkCount; i++) {
            spOffsets[i * 3 + 0] = Math.random() * Math.PI * 2;
            spOffsets[i * 3 + 1] = (Math.random() - 0.5) * 12000; 
            spOffsets[i * 3 + 2] = Math.random(); 
            
            spData[i * 3 + 0] = Math.random() * Math.PI * 2;
            spData[i * 3 + 1] = 6.0 + Math.random() * 12.0;   
            spData[i * 3 + 2] = 40.0 + Math.random() * 100.0; 
            
            let c = Math.random() > 0.5 ? cCyan : cBlue;
            if (Math.random() > 0.85) c = cWhite;
            spColors[i*3+0] = c.r; spColors[i*3+1] = c.g; spColors[i*3+2] = c.b;
        }

        sparkGeoInst.setAttribute('aOffset', new THREE.InstancedBufferAttribute(spOffsets, 3));
        sparkGeoInst.setAttribute('aData', new THREE.InstancedBufferAttribute(spData, 3));
        sparkGeoInst.setAttribute('aColor', new THREE.InstancedBufferAttribute(spColors, 3)); 

        const uniformsSparks = {
            uTime: { value: 0.0 },
            uTravelOffset: { value: 0.0 }, 
            uIntensity: { value: 0.0 },
            uTwist: { value: 0.0 },
            uBowFocus: { value: 0.0 },
            uVisualSpeed: { value: 0.0 },
            uExitProgress: { value: 0.0 } 
        };

        const sparkMaterial = new THREE.ShaderMaterial({
            uniforms: uniformsSparks,
            vertexShader: `
                uniform float uTime;
                uniform float uTravelOffset;
                uniform float uTwist;
                uniform float uBowFocus;
                uniform float uIntensity;
                uniform float uVisualSpeed;
                uniform float uExitProgress;

                attribute vec3 aOffset; 
                attribute vec3 aData;   
                attribute vec3 aColor;

                varying vec3 vColor;
                varying vec2 vUv;
                varying float vAlpha;
                varying float vPhase;

                void main() {
                    vUv = uv;
                    vColor = aColor;
                    vPhase = aData.x;

                    float len = 12000.0;
                    
                    float travel = uTravelOffset * len + uTime * 600.0 * uBowFocus;
                    // POPRAWKA: Zmiana '-' na '+'. Sprawia, że iskry tunelu lecą zawsze w stronę silników statku (+Z).
                    float shiftedZ = (aOffset.y + travel) + len / 2.0;
                    
                    float wrappedZ = (shiftedZ - len * floor(shiftedZ / len)) - len / 2.0;

                    float spoolBulge = smoothstep(-1500.0, 1500.0, wrappedZ); 
                    float spoolRadius = mix(150.0 + aOffset.z * 80.0, 480.0 + aOffset.z * 150.0, spoolBulge);
                    
                    float tunnelBulge = smoothstep(-2000.0, 4000.0, wrappedZ); 
                    float tunnelRadius = mix(320.0 + aOffset.z * 100.0, 600.0 + aOffset.z * 200.0, tunnelBulge);
                    
                    float currentRadius = mix(tunnelRadius, spoolRadius, uBowFocus);

                    float orbitAngle = aOffset.x + uTime * 4.0 * uBowFocus;
                    vec3 pos = vec3(cos(orbitAngle) * currentRadius, sin(orbitAngle) * currentRadius, wrappedZ);

                    float uvY = 0.5 - (pos.z / len);
                    float distToBow = abs(uvY - 0.583);
                    float bowTwistMask = 1.0 - smoothstep(0.0, 0.2, distToBow);
                    float localTwist = uTwist + (bowTwistMask * uBowFocus * 15.0);
                    float angleRot = uvY * localTwist * 6.2831853; 
                    
                    float c = cos(angleRot);
                    float s = sin(angleRot);
                    float nx = pos.x * c - pos.y * s;
                    float ny = pos.x * s + pos.y * c;
                    pos.x = nx;
                    pos.y = ny;

                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    
                    // --- 1. FIZYKA ODERWANIA W GÓRĘ EKRANU (-Z) ---
                    float t_exit = uExitProgress * 2.5; 
                    float drag = 1.5 + (aOffset.z * 1.5); 
                    float initSpeed = 15000.0 + (aData.y * 1000.0); 
                    
                    float traveledDist = initSpeed * ((1.0 - exp(-t_exit * drag)) / drag);
                    
                    float dynamicSpread = uExitProgress * (0.8 + aOffset.z);
                    
                    vec3 localConeDir = normalize(vec3(
                        cos(orbitAngle) * sin(dynamicSpread),
                        sin(orbitAngle) * sin(dynamicSpread),
                        -cos(dynamicSpread) // ZMIANA: -Z wysyła cząsteczki "w górę" ekranu, w stronę lotu
                    ));
                    
                    vec3 viewConeDir = normalize((modelViewMatrix * vec4(localConeDir, 0.0)).xyz);
                    
                    mvPosition.xyz += viewConeDir * traveledDist;

                    // --- 2. BILLBOARDING ---
                    float spiralPower = 1.6 * uBowFocus; 
                    vec3 localForward = normalize(vec3(
                        -sin(orbitAngle) * spiralPower,
                        cos(orbitAngle) * spiralPower,
                        1.0 
                    ));
                    
                    vec3 viewForward = normalize((modelViewMatrix * vec4(localForward, 0.0)).xyz);
                    vec3 finalViewForward = normalize(mix(viewForward, viewConeDir, smoothstep(0.0, 0.3, uExitProgress)));
                    
                    vec3 camToPos = normalize(mvPosition.xyz);
                    vec3 viewRight = cross(camToPos, finalViewForward);
                    
                    if (length(viewRight) < 0.001) {
                        viewRight = vec3(1.0, 0.0, 0.0);
                    } else {
                        viewRight = normalize(viewRight);
                    }

                    // --- 3. DEFORMACJA W GRUZ ---
                    float width = aData.y;
                    float baseStretch = mix(aData.z, aData.z * 0.25, uBowFocus) + (uVisualSpeed * 80.0); 
                    
                    float exitStretch = aData.z * mix(1.0, 0.15, smoothstep(0.0, 0.4, uExitProgress)); 
                    float stretch = mix(baseStretch, exitStretch, uExitProgress > 0.0 ? 1.0 : 0.0); 
                    
                    width = mix(width, width * 3.0, uExitProgress > 0.0 ? 1.0 : 0.0);

                    vec3 localOffset = viewRight * position.x * width + finalViewForward * position.y * stretch;
                    mvPosition.xyz += localOffset;
                    
                    float spoolMask = smoothstep(0.30, 0.45, uvY) * (1.0 - smoothstep(0.55, 0.70, uvY));
                    float edgeFade = smoothstep(0.0, 0.2, uvY) * (1.0 - smoothstep(0.8, 1.0, uvY));
                    float currentMask = mix(edgeFade, spoolMask * 1.5, uBowFocus);

                    float exitFadeAlpha = 1.0 - smoothstep(0.5, 1.0, uExitProgress);

                    float flicker = 0.6 + 0.4 * sin(uTime * 40.0 + aData.x * 7.0);
                    
                    vAlpha = max(0.0, uIntensity * currentMask * flicker * exitFadeAlpha);

                    gl_Position = projectionMatrix * mvPosition;
                }
            `,

                varying float vPhase;

                    vec3 finalColor = brightColor * 2.0 * (0.5 + twinkle * mix(1.5, 8.0, uExitProgress));

                    gl_FragColor = vec4(finalColor * alpha, alpha);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

                uniform float uTime;

                float hash(vec3 p) { return fract(sin(dot(p, vec3(12.9898, 78.233, 37.719))) * 43758.5453); }
                float noise(vec3 p) {

                uniform float uRadialBlur;
                uniform float uFlash;
                uniform float uVignette;
                uniform float uDopplerY;
                varying vec2 vUv;

                void main() {
                    vec2 center = vec2(0.5, 0.5);
                    vec2 uv = vUv;
                    vec2 dir = uv - center;
                    float dist = length(dir);

                    vec3 color = vec3(0.0);

            flowSpeed: 0.0,
            ribbonScale: 12.0,
            energyThreshold: 0.15,
            intensity: 0.0,
            twist: 0.0,
            bowFocus: 0.0,
            aberration: 0.0,
            radialBlur: 0.0,
            shake: 0.0,
            lightning: 0.0,
            vignette: 0.2,
            dopplerY: 1.0,
            colorShift: 0.0
        };

        let currentFlash = 0.0;
        let currentShake = 0.0;

        let currentVisualSpeed = 0.0;
        let globalTravelOffset = 0.0;

        const statusEl = document.getElementById('status');
        const progressBarContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');

        let currentStage = 'IDLE';

        let isSpooling = false;
        let spoolTimer = 0.0;
        const spoolDuration = WARP_CONFIG.spoolDuration;

        let isExiting = false;
        let exitTimer = 0.0;

        // Clock-based stage transitions (replace setTimeouts).
        // When >= 0, the animate loop will fire the transition at the given globalTime.
        let pendingTunnelAt = -1.0;
        let pendingExitSettleAt = -1.0;

        // Tunnel event scheduler
        let nextTunnelEventAt = 0.0;
        let tunnelEventEndAt = -1.0;
        let tunnelEventStrength = 0.0;
        const tunnelEventColor = new THREE.Color(1.0, 0.8, 0.3);

        function scheduleNextTunnelEvent() {
            const gap = WARP_CONFIG.tunnelEventMinGap +
                        Math.random() * (WARP_CONFIG.tunnelEventMaxGap - WARP_CONFIG.tunnelEventMinGap);
            nextTunnelEventAt = globalTime + gap;
        }

        function fireTunnelEvent() {
            // Random color: gold, magenta, ice-cyan
            const r = Math.random();
            if (r < 0.5)       tunnelEventColor.setRGB(1.0, 0.75, 0.25);   // gold
            else if (r < 0.8)  tunnelEventColor.setRGB(1.0, 0.35, 0.9);    // magenta
            else               tunnelEventColor.setRGB(0.6, 1.0, 1.2);     // ice
            tunnelEventEndAt = globalTime + 0.55;
            tunnelEventStrength = 1.0;
            scheduleNextTunnelEvent();
        }

        function setStage(stage) {
            currentStage = stage;
            statusEl.innerText = "STATUS: " + stage;

            if (stage === 'SPOOL') {
                isSpooling = true;
                isExiting = false;
                spoolTimer = 0.0;
                pendingTunnelAt = -1.0;
                pendingExitSettleAt = -1.0;
                progressBarContainer.style.display = 'block';
                progressBar.style.width = '0%';

                target.bowFocus = 1.0;
                target.speed = 0.0;
                target.aberration = 0.2;
                target.lightning = 0.0;
                target.shake = 0.05;
                target.radialBlur = 0.0;
                target.vignette = 0.2;
                target.dopplerY = 1.0;
                target.colorShift = 0.0;
                targetFov = WARP_CONFIG.baseFov;
                targetCameraY = WARP_CONFIG.cameraBaseY;
                cameraRollTarget = 0.0;
            }
            else if (stage === 'JUMP') {
                isSpooling = false;
                isExiting = false;
                pendingExitSettleAt = -1.0;
                progressBarContainer.style.display = 'none';

                // Bow shock spawn (punch through membrane).
                uniformsBowShock.uShockTime.value = globalTime;
                uniformsPlasma.uDischarge.value = 1.0; // discharges, then damped down

                // Blast u dołu statku (+Z) jako ciąg silnika
                uniformsBlast.uShootTime.value = globalTime;
                uniformsBlast.uShipZ.value = 1000.0;

                target.speed = 18.0;
                target.flowSpeed = 0.0;
                target.ribbonScale = 12.0;
                target.energyThreshold = 0.15;
                target.intensity = 1.5;
                target.twist = 0.0;
                target.bowFocus = 0.0;

                target.aberration = 1.0;
                target.lightning = 1.2;

                currentFlash = 1.0;
                currentShake = 1.5;
                target.shake = 0.4;
                target.vignette = 0.6;
                target.dopplerY = 1.6;
                target.colorShift = 0.0;
                targetFov = WARP_CONFIG.baseFov + 12.0; // FOV pop on jump
                targetCameraY = WARP_CONFIG.cameraBaseY;

                // Schedule TUNNEL transition via clock (no setTimeout — frame-rate independent).
                pendingTunnelAt = globalTime + WARP_CONFIG.jumpFlashDuration;
            }
            else if (stage === 'EXIT') {
                isSpooling = false;
                isExiting = true;
                exitTimer = 0.0;
                pendingTunnelAt = -1.0;
                progressBarContainer.style.display = 'none';

                // NOWE: Odpalenie fali uderzeniowej do GÓRY (Cone z Railguna)
                uniformsExitCone.uShootTime.value = globalTime;
                // Bow shock on exit (popping through into normal space).
                uniformsBowShock.uShockTime.value = globalTime;

                // Phase-1 "punch out" targets — animate() will sweep these
                // through phase 2 (decel) and phase 3 (settle).
                target.speed = 8.0;          // start of decel; ramps to 0 over decel phase
                target.flowSpeed = 5.0;
                target.ribbonScale = 20.0;
                target.energyThreshold = 0.6;
                target.intensity = 0.0;
                target.twist = 6.0;          // SOFTENED from 12.0 (motion-sickness)

                target.aberration = 1.2;
                target.lightning = 0.0;

                currentFlash = 1.5;
                currentShake = 2.0;
                target.radialBlur = 0.0;
                target.shake = 0.0;
                target.vignette = 0.5;
                target.dopplerY = 1.4;

                targetFov = WARP_CONFIG.exitPunchFov; // FOV pop
                cameraRollTarget = 0.0;

                // Settle clean-up scheduled via clock.
                pendingExitSettleAt = globalTime + WARP_CONFIG.exitTotalDuration;
            }
        }


        // --- 7. PĘTLA RENDEROWANIA ---
        const clock = new THREE.Clock();

        // Spool sub-uniforms for the plasma ball anticipation peak
        let spoolPeakValue = 0.0;

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            globalTime += delta;

            uniformsBack.uTime.value = globalTime;
            uniformsFront.uTime.value = globalTime;
            uniformsSparks.uTime.value = globalTime;
            uniformsBlast.uTime.value = globalTime;
            uniformsExitCone.uTime.value = globalTime;
            uniformsShip.uTime.value = globalTime;
            uniformsStarfield.uTime.value = globalTime;
            uniformsPlasma.uTime.value = globalTime;
            uniformsBowShock.uTime.value = globalTime;

            // ===== Clock-based stage transitions (replace setTimeout) =====
            if (pendingTunnelAt > 0 && globalTime >= pendingTunnelAt && currentStage === 'JUMP') {
                pendingTunnelAt = -1.0;
                currentStage = 'TUNNEL';
                statusEl.innerText = "STATUS: TUNNEL";
                target.speed = 8.0;
                target.intensity = 1.0;
                target.twist = 0.2;
                target.aberration = 0.3;
                target.lightning = 0.6;
                target.shake = 0.1;
                target.radialBlur = 0.5;
                target.vignette = 0.35;
                target.dopplerY = 1.8;
                targetFov = WARP_CONFIG.baseFov;
                // Start tunnel events scheduler.
                scheduleNextTunnelEvent();
            }

            if (pendingExitSettleAt > 0 && globalTime >= pendingExitSettleAt && currentStage === 'EXIT') {
                pendingExitSettleAt = -1.0;
                // After full exit duration, kill warp visuals — destination space remains.
                target.flowSpeed = 0.0;
                target.aberration = 0.0;
                target.intensity = 0.0;
                target.twist = 0.0;
                target.radialBlur = 0.0;
                target.vignette = 0.2;
                target.dopplerY = 1.0;
                targetFov = WARP_CONFIG.baseFov;
                targetCameraY = WARP_CONFIG.cameraBaseY;
                isExiting = false; // freeze exit progress
            }

            // ===== SPOOL: 3-phase progress curve =====
            if (isSpooling) {
                spoolTimer += delta;
                const p = Math.min(spoolTimer / spoolDuration, 1.0);

                progressBar.style.width = (p * 100) + '%';

                const charge = smoothstep(0.0, 0.5, p);
                const arc    = smoothstep(0.5, 0.85, p);
                const peak   = smoothstep(0.85, 1.0, p);

                // Lightning crackles louder & faster as peak nears.
                const peakFlicker = 0.5 + 0.5 * Math.sin(globalTime * 40.0);
                target.lightning = charge * 0.3 + arc * 1.2 + peak * (1.5 + peakFlicker);
                target.intensity = charge * 0.4 + arc * 0.7 + peak * 1.1;
                target.shake     = charge * 0.05 + arc * 0.20 + peak * 0.55;
                target.flowSpeed = charge * 1.0 + arc * 2.0 + peak * 3.0;
                target.twist     = charge * 1.0 + arc * 3.5 + peak * 6.0;
                target.ribbonScale     = 35.0 - (charge * 5.0 + arc * 8.0 + peak * 12.0);
                target.energyThreshold = 0.70 - (charge * 0.10 + arc * 0.15 + peak * 0.10);
                target.aberration = 0.1 + p * 0.5;
                target.vignette   = 0.2 + peak * 0.6;

                // FOV pump in peak phase: 60 -> 72, then snap back in last 0.2s.
                const lastWindow = Math.max(0, (p - 0.92) / 0.08); // 0..1 in last 8%
                targetFov = WARP_CONFIG.baseFov + peak * (WARP_CONFIG.spoolPeakFov - WARP_CONFIG.baseFov) * (1.0 - lastWindow);

                uniformsShip.uSpoolProgress.value = p;
                uniformsPlasma.uSpoolProgress.value = charge * 0.5 + arc + peak;
                spoolPeakValue = peak;
                uniformsPlasma.uSpoolPeak.value = peak;

                // Plasma ball grows with charge progress.
                const ballScale = 0.001 + (charge * 0.6 + arc * 0.4) * (1.0 + peak * 0.3);
                plasmaBall.scale.setScalar(ballScale);
            } else {
                uniformsShip.uSpoolProgress.value = damp(uniformsShip.uSpoolProgress.value, 0.0, 8.0, delta);
                uniformsPlasma.uSpoolProgress.value = damp(uniformsPlasma.uSpoolProgress.value, 0.0, 4.0, delta);
                uniformsPlasma.uSpoolPeak.value = damp(uniformsPlasma.uSpoolPeak.value, 0.0, 6.0, delta);
                plasmaBall.scale.setScalar(damp(plasmaBall.scale.x, 0.001, 4.0, delta));
                spoolPeakValue = 0.0;
            }
            // Plasma discharge decays after JUMP.
            uniformsPlasma.uDischarge.value = damp(uniformsPlasma.uDischarge.value, 0.0, 4.0, delta);

            // ===== EXIT: 3-phase punch / decel / settle =====
            if (isExiting) {
                exitTimer += delta;
                const totalP = Math.min(exitTimer / WARP_CONFIG.exitTotalDuration, 1.0);
                uniformsSparks.uExitProgress.value = totalP;

                // Phase booleans (with smooth curve for decel)
                const t = exitTimer;
                const T = WARP_CONFIG;
                if (t < T.exitPunchDuration) {
                    // Phase 1: PUNCH OUT
                    target.twist = 6.0;
                    target.intensity = lerp(1.0, 0.4, t / T.exitPunchDuration);
                    target.aberration = 1.2;
                    target.dopplerY = 1.6;
                } else if (t < T.exitPunchDuration + T.exitDecelDuration) {
                    // Phase 2: DECEL — smooth speed brake
                    const decelP = (t - T.exitPunchDuration) / T.exitDecelDuration;
                    target.speed = lerp(8.0, 0.0, easeOutQuart(decelP));
                    target.twist = lerp(6.0, 0.5, easeOutQuart(decelP));
                    target.intensity = lerp(0.4, 0.05, decelP);
                    target.aberration = lerp(1.2, 0.4, decelP);
                    target.dopplerY = lerp(1.6, 1.1, decelP);
                    target.lightning = lerp(0.8, 0.15, decelP); // residual sparks
                    targetFov = lerp(WARP_CONFIG.exitPunchFov, WARP_CONFIG.baseFov, decelP);
                    targetCameraY = lerp(WARP_CONFIG.cameraBaseY, WARP_CONFIG.cameraExitZoomY, decelP);
                } else {
                    // Phase 3: SETTLE — destination space materialises
                    const settleP = Math.min((t - T.exitPunchDuration - T.exitDecelDuration) / T.exitSettleDuration, 1.0);
                    target.speed = 0.0;
                    target.twist = lerp(0.5, 0.0, settleP);
                    target.intensity = 0.0;
                    target.aberration = lerp(0.4, 0.0, settleP);
                    target.dopplerY = lerp(1.1, 1.0, settleP);
                    target.lightning = lerp(0.15, 0.0, settleP);
                    target.vignette = lerp(0.5, 0.2, settleP);
                    targetCameraY = lerp(WARP_CONFIG.cameraExitZoomY, WARP_CONFIG.cameraExitPullY, easeOutQuart(settleP));
                }

                globalTravelOffset += delta * (1.0 - totalP) * 40.0;
            } else {
                // Damp exit progress back to 0 when not exiting.
                uniformsSparks.uExitProgress.value = damp(uniformsSparks.uExitProgress.value, 0.0, 4.0, delta);
            }

            // Tunnel uExitProgress: drives collapse-to-axis.
            const exitProgress = uniformsSparks.uExitProgress.value;
            uniformsBack.uExitProgress.value = exitProgress;
            uniformsFront.uExitProgress.value = exitProgress;

            // ===== TUNNEL: events + color shift + pulsing twist + camera roll =====
            if (currentStage === 'TUNNEL') {
                // Pulsing twist (subtle breathing).
                target.twist = 0.2 + Math.sin(globalTime * 0.4) * 0.25;
                // Camera roll (very subtle hyperspace banking).
                cameraRollTarget = Math.sin(globalTime * 0.18) * 0.05;

                // Distance-based color shift advances slowly.
                target.colorShift = Math.min(1.0, target.colorShift + delta * 0.025);

                // Schedule events
                if (nextTunnelEventAt > 0 && globalTime >= nextTunnelEventAt) {
                    fireTunnelEvent();
                }
                if (tunnelEventEndAt > 0) {
                    if (globalTime >= tunnelEventEndAt) {
                        tunnelEventEndAt = -1.0;
                        tunnelEventStrength = 0.0;
                    } else {
                        const eventDur = 0.55;
                        const tt = (tunnelEventEndAt - globalTime) / eventDur; // 1 -> 0
                        tunnelEventStrength = Math.sin(Math.max(0, Math.min(1, tt)) * Math.PI); // bell curve
                    }
                }
            } else if (currentStage !== 'EXIT') {
                cameraRollTarget = 0.0;
                if (currentStage !== 'TUNNEL') target.colorShift = damp(target.colorShift, 0.0, 1.5, delta);
            }

            // Damping rates: stage-dependent for snappiness on JUMP/EXIT.
            let rate = 2.0;
            let twistRate = 1.0;
            if (currentStage === 'JUMP') rate = 5.0;
            if (currentStage === 'EXIT') { rate = 4.0; twistRate = 5.0; }
            if (currentStage === 'TUNNEL') twistRate = 0.8;

            // ===== Frame-rate-independent damping for all values =====
            currentFlash = damp(currentFlash, 0.0, 5.0, delta);
            currentShake = damp(currentShake, target.shake, 5.0, delta);
            uniformsPP.uFlash.value = currentFlash;

            uniformsPP.uAberration.value = damp(uniformsPP.uAberration.value, target.aberration, rate, delta);
            uniformsPP.uRadialBlur.value = damp(uniformsPP.uRadialBlur.value, target.radialBlur, rate, delta);
            uniformsPP.uVignette.value   = damp(uniformsPP.uVignette.value,   target.vignette,   rate, delta);
            uniformsPP.uDopplerY.value   = damp(uniformsPP.uDopplerY.value,   target.dopplerY,   rate, delta);

            currentVisualSpeed = damp(currentVisualSpeed, target.speed, rate, delta);
            globalTravelOffset += currentVisualSpeed * delta;

            const curIntensity       = damp(uniformsBack.uIntensity.value,       target.intensity,       rate, delta);
            const curTwist           = damp(uniformsBack.uTwist.value,           target.twist,           twistRate, delta);
            const curBowFocus        = damp(uniformsBack.uBowFocus.value,        target.bowFocus,        rate, delta);
            const curFlowSpeed       = damp(uniformsBack.uFlowSpeed.value,       target.flowSpeed,       rate, delta);
            const curRibbonScale     = damp(uniformsBack.uRibbonScale.value,     target.ribbonScale,     rate, delta);
            const curEnergyThreshold = damp(uniformsBack.uEnergyThreshold.value, target.energyThreshold, rate, delta);
            const curLightning       = damp(uniformsBack.uLightning.value,       target.lightning,       rate, delta);
            const curColorShift      = damp(uniformsBack.uColorShift.value,      target.colorShift,      1.5, delta);
            const curEventFlash      = damp(uniformsBack.uEventFlash.value,      tunnelEventStrength,    8.0, delta);

            uniformsBack.uTravelOffset.value = globalTravelOffset;
            uniformsFront.uTravelOffset.value = globalTravelOffset;
            uniformsSparks.uTravelOffset.value = globalTravelOffset;

            uniformsSparks.uVisualSpeed.value = currentVisualSpeed;

            uniformsBack.uFlowSpeed.value = curFlowSpeed; uniformsFront.uFlowSpeed.value = curFlowSpeed;
            uniformsBack.uRibbonScale.value = curRibbonScale; uniformsFront.uRibbonScale.value = curRibbonScale;
            uniformsBack.uEnergyThreshold.value = curEnergyThreshold; uniformsFront.uEnergyThreshold.value = curEnergyThreshold;

            uniformsBack.uIntensity.value = curIntensity; uniformsFront.uIntensity.value = curIntensity;
            uniformsBack.uTwist.value = curTwist; uniformsFront.uTwist.value = curTwist;
            uniformsBack.uBowFocus.value = curBowFocus; uniformsFront.uBowFocus.value = curBowFocus;
            uniformsBack.uLightning.value = curLightning; uniformsFront.uLightning.value = curLightning;
            uniformsBack.uColorShift.value = curColorShift; uniformsFront.uColorShift.value = curColorShift;
            uniformsBack.uEventFlash.value = curEventFlash; uniformsFront.uEventFlash.value = curEventFlash;
            uniformsBack.uColorAccent.value.copy(tunnelEventColor);
            uniformsFront.uColorAccent.value.copy(tunnelEventColor);

            uniformsSparks.uIntensity.value = curIntensity;
            uniformsSparks.uTwist.value = curTwist;
            uniformsSparks.uBowFocus.value = curBowFocus;

            // Starfield: stretch streaks scale with travel speed; visibility dims inside tunnel.
            const tunnelOcclusion = (currentStage === 'TUNNEL' || currentStage === 'JUMP') ? 0.25 : 1.0;
            uniformsStarfield.uVisibility.value = damp(uniformsStarfield.uVisibility.value, tunnelOcclusion, 2.5, delta);
            uniformsStarfield.uWarpStretch.value = damp(uniformsStarfield.uWarpStretch.value, Math.min(1.0, currentVisualSpeed / 12.0), 4.0, delta);
            uniformsStarfield.uExitProgress.value = damp(uniformsStarfield.uExitProgress.value,
                isExiting ? smoothstep(WARP_CONFIG.exitPunchDuration + WARP_CONFIG.exitDecelDuration * 0.5, WARP_CONFIG.exitTotalDuration, exitTimer) : (currentStage === 'IDLE' ? 1.0 : 0.0), 2.0, delta);

            // FOV damping
            camera.fov = damp(camera.fov, targetFov, 4.0, delta);
            camera.updateProjectionMatrix();

            // Camera roll damping (very subtle)
            currentCameraRoll = damp(currentCameraRoll, cameraRollTarget, 1.5, delta);

            // Camera position with shake.
            // IMPORTANT: do NOT call lookAt() every frame. The camera was oriented at startup
            // (top-down). Calling lookAt(0,0,0) here combined with random per-frame shake
            // would re-aim the camera each frame, making the entire scene appear to spin
            // around the center. Just translate position; orientation stays from startup.
            const lerpedCamY = damp(camera.position.y, targetCameraY, 5.0, delta);
            camera.position.set(
                baseCameraX + (Math.random() - 0.5) * currentShake * 150.0,
                lerpedCamY + (Math.random() - 0.5) * currentShake * 150.0,
                baseCameraZ + (Math.random() - 0.5) * currentShake * 150.0
            );
            // Camera roll: apply only to local Z, preserving the startup -PI/2 X rotation.
            camera.rotation.z = currentCameraRoll;

            targetDrift = 0.0;
            if (keys.a) targetDrift = 0.6;
            if (keys.d) targetDrift = -0.6;

            currentDrift = damp(currentDrift, targetDrift, 5.0, delta);

            shipContainer.rotation.y = currentDrift;
            tunnelBack.rotation.y = currentDrift * 0.7;
            tunnelFront.rotation.y = currentDrift * 0.7;
            sparksMesh.rotation.y = currentDrift * 0.7;

            renderer.setRenderTarget(renderTarget);
            renderer.clear();
            renderer.render(scene, camera);

            renderer.setRenderTarget(null);
            renderer.clear();
            renderer.render(orthoScene, orthoCamera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderTarget.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
