<svg xmlns="http://www.w3.org/2000/svg" width="180" height="120" viewBox="0 0 180 120">
  <defs>
    <radialGradient id="lpd-dome" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a3050" />
      <stop offset="100%" stop-color="#121828" />
    </radialGradient>
    <linearGradient id="lpd-beam" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#6ec8ff" />
      <stop offset="100%" stop-color="#3090d0" />
    </linearGradient>
  </defs>
  <!-- Turret dome -->
  <ellipse cx="46" cy="62" rx="34" ry="28" fill="url(#lpd-dome)" stroke="#0e1424" stroke-width="3" />
  <!-- Lens array -->
  <rect x="74" y="52" width="46" height="16" rx="8" fill="#1a2844" stroke="#2a4472" stroke-width="2" />
  <!-- Beam emitter -->
  <circle cx="97" cy="60" r="6" fill="url(#lpd-beam)" stroke="#1a2844" stroke-width="2" />
  <circle cx="97" cy="60" r="3" fill="#ffffff" opacity="0.5" />
  <!-- Beam line -->
  <line x1="108" y1="60" x2="170" y2="60" stroke="#6ec8ff" stroke-width="3" opacity="0.5" stroke-linecap="round" />
  <line x1="108" y1="60" x2="170" y2="60" stroke="#ffffff" stroke-width="1" opacity="0.6" stroke-linecap="round" />
  <!-- Cooling fins -->
  <rect x="24" y="42" width="4" height="36" rx="1" fill="#2a4060" opacity="0.7" />
  <rect x="32" y="46" width="4" height="28" rx="1" fill="#2a4060" opacity="0.6" />
  <!-- Sensor -->
  <circle cx="46" cy="48" r="4" fill="#6ec8ff" opacity="0.5" />
  <!-- Base -->
  <rect x="20" y="86" width="52" height="8" rx="3" fill="#1a2844" stroke="#0e1424" stroke-width="2" />
</svg>
